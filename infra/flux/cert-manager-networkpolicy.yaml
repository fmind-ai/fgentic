# The controller and CA injector expose unauthenticated HTTP metrics through separate Services.
# Select only those two chart components and admit the exact platform Prometheus identity.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager-metrics-ingress
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: cert-manager
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - cainjector
          - controller
      - key: app.kubernetes.io/name
        operator: In
        values:
          - cainjector
          - cert-manager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              fgentic.dev/metrics-reader: prometheus
      ports:
        - protocol: TCP
          port: 9402
---
# The webhook shares one Pod between admission, health, and unauthenticated metrics. Kubernetes
# API-server source addresses vary between k3d and GKE, so keep only the TLS admission port
# source-unrestricted. Kubelet probes on :6080 remain covered by Kubernetes'
# explicit local-node traffic exception; unrelated Pods receive no health-listener allowance.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager-webhook-ingress
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: webhook
      app.kubernetes.io/instance: cert-manager
      app.kubernetes.io/name: webhook
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 10250
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              fgentic.dev/metrics-reader: prometheus
      ports:
        - protocol: TCP
          port: 9402
