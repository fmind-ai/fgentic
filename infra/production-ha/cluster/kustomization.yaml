# Production availability is an opt-in structural profile, separate from provider selection.
# Each Flux layer keeps owning its normal path; these downstream Components only add replica,
# disruption-budget, and resource posture. Evaluation clusters therefore remain lightweight.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: controllers
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../production-ha/controllers
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: postgres
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../production-ha/postgres
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: keycloak
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../production-ha/keycloak
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: matrix
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../production-ha/matrix
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: agentgateway
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../production-ha/agentgateway
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: kagent
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../production-ha/kagent
