# Three CNPG instances provide one primary and two streaming replicas. CNPG owns the generated
# database PDB and failover lifecycle; this profile changes only the declared instance count.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: platform-pg
      namespace: postgres
    patch: |
      - op: replace
        path: /spec/instances
        value: 3
