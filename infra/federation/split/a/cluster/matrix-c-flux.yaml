apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: matrix-c
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./infra/federation/split/a/matrix-c
  prune: true
  wait: true
  timeout: 20m
  dependsOn:
    - name: postgres
    - name: gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
