# A needs only ingress/PKI, CNPG, ESS, agentgateway, and kagent sources/controllers.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../flux
components:
  - ../../../controllers
patches:
  - target: {
      group: source.toolkit.fluxcd.io,
      version: v1,
      kind: HelmRepository,
      name: codecentric,
      namespace: flux-system,
    }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: codecentric
        namespace: flux-system
