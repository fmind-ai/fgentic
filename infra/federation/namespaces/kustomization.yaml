# Keep only namespaces used by the provider-free federation topology and add homeservers B and C.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - namespace.yaml
patches:
  - target: { kind: Namespace, name: keycloak }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: keycloak
  - target: { kind: Namespace, name: agentgateway-system }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: agentgateway-system
  - target: { kind: Namespace, name: kagent }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: kagent
  - target: { kind: Namespace, name: bridge }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: bridge
  - target: { kind: Namespace, name: bridges }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: bridges
  - target: { kind: Namespace, name: monitoring }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring
  - target: { kind: Namespace, name: models }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: models
