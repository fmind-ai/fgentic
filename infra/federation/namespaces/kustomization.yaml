# Keep the provider-free delegation namespaces, omit unrelated stacks, and add homeservers B/C.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - namespace.yaml
patches:
  - target: { kind: Namespace, name: bridge }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: bridge
  - target: { kind: Namespace, name: bridges }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: bridges
  - target: { kind: Namespace, name: monitoring }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring
