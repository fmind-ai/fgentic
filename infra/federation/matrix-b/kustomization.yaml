apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../apps/synapse-federation-policy
resources:
  - helmrelease.yaml
  - gateway.yaml
  - httproutes.yaml
patches:
  # Scope only the namespace-neutral policy objects; Gateway and certificate resources remain in
  # their explicitly declared `gateway` namespace.
  - target:
      version: v1
      kind: ConfigMap
      name: fgentic-synapse-federation-policy-v1
    patch: |
      - op: add
        path: /metadata/namespace
        value: matrix-b
  - target:
      version: v1
      kind: ConfigMap
      name: fgentic-federation-policy
    patch: |
      - op: add
        path: /metadata/namespace
        value: matrix-b
