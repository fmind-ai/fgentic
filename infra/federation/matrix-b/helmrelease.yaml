# A second, namespace-isolated ESS release containing only Synapse and well-known delegation.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matrix-stack-b
  namespace: matrix-b
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  releaseName: ess
  chartRef:
    kind: OCIRepository
    name: ess-matrix-stack
    namespace: flux-system
  values:
    serverName: ${federation_partner_server_name}
    storage:
      resourcePolicy: delete

    synapse:
      ingress:
        host: matrix.${federation_partner_server_name}
        tlsEnabled: false
      postgres:
        host: platform-pg-rw.postgres.svc.cluster.local
        port: 5432
        user: synapse_b
        database: synapse_b
        sslMode: require
        password:
          secret: pg-synapse-b
          secretKey: password
      serviceMonitors:
        enabled: false
      hostAliases:
        - ip: ${federation_gateway_ip}
          hostnames:
            - ${server_name}
            - matrix.${server_name}
            - ${federation_partner_server_name}
            - matrix.${federation_partner_server_name}
            - ${federation_denied_server_name}
            - matrix.${federation_denied_server_name}
      # The public CA certificate is provisioned cluster-locally in every Matrix namespace.
      extraVolumes:
        - name: federation-ca
          configMap:
            name: fgentic-local-ca
            items:
              - key: ca.crt
                path: ca.crt
          mountContext: both
        - name: federation-policy-module
          configMap:
            name: fgentic-synapse-federation-policy-v1
          mountContext: both
        - name: federation-policy
          configMap:
            name: fgentic-federation-policy
          mountContext: both
      extraVolumeMounts:
        - name: federation-ca
          mountPath: /etc/fgentic-ca
          readOnly: true
          mountContext: both
        - name: federation-policy-module
          mountPath: /opt/fgentic/synapse-modules
          readOnly: true
          mountContext: both
        - name: federation-policy
          mountPath: /etc/fgentic/federation-policy
          readOnly: true
          mountContext: both
      extraEnv:
        - name: PYTHONPATH
          value: /opt/fgentic/synapse-modules
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
      additional:
        10-federation:
          config: |
            default_room_version: "12"
            federation_domain_whitelist:
              - ${server_name}
              - ${federation_partner_server_name}
            federation_custom_ca_list:
              - /etc/fgentic-ca/ca.crt
            ip_range_whitelist:
              - ${federation_gateway_ip}/32
            trusted_key_servers:
              - server_name: ${server_name}
            federation_whitelist_endpoint_enabled: true
        20-federation-policy:
          config: |
            modules:
              - module: fgentic_federation_policy.FederationPolicyModule
                config:
                  policy_path: /etc/fgentic/federation-policy/policy.json
      appservices: []

    matrixAuthenticationService:
      enabled: false
    elementWeb:
      enabled: false
    elementAdmin:
      enabled: false
    matrixRTC:
      enabled: false

    wellKnownDelegation:
      enabled: true
      ingress:
        tlsEnabled: false
      additional:
        client: |
          {"io.element.e2ee": {"default": false, "force_disable": true}}

    postgres:
      enabled: false
