# Opt-in wiring for the provider-free federation lab. Existing Flux units retain field ownership;
# delegation components extend Keycloak, agentgateway, and the single exposed docs-qa agent.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - matrix-b-flux.yaml
  - matrix-c-flux.yaml
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: namespaces
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components
        value:
          - ../federation/namespaces
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: controllers
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components
        value:
          - ../federation/controllers
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: postgres
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../federation/postgres
      - op: replace
        path: /spec/dependsOn
        value:
          - name: controllers
          - name: platform-secrets
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: gateway
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components
        value:
          - ../federation/gateway
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: matrix
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../federation/matrix-a
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: observability
      namespace: flux-system
    patch: |
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: observability
        namespace: flux-system
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: observability-monitors
      namespace: flux-system
    patch: |
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: observability-monitors
        namespace: flux-system
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: keycloak
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components
        value:
          - ../federation/delegation/keycloak
      - op: add
        path: /spec/dependsOn/-
        value:
          name: matrix-b
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: agentgateway
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components
        value:
          - ../federation/delegation
      - op: replace
        path: /spec/dependsOn
        value:
          - name: controllers
          - name: keycloak
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: kagent
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components
        value:
          - ../federation/delegation/kagent
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: bridge
      namespace: flux-system
    patch: |
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: bridge
        namespace: flux-system
