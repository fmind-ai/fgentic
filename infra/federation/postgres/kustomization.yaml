# Federation CNPG inventory: four homeservers plus the provider-free Keycloak/kagent/knowledge plane.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - database.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: platform-pg
      namespace: postgres
    patch: |
      - op: remove
        path: /spec/backup
      - op: remove
        path: /spec/serviceAccountTemplate
      - op: replace
        path: /spec/monitoring/enablePodMonitor
        value: false
      - op: replace
        path: /spec/managed/roles
        value:
          - name: synapse
            login: true
            passwordSecret:
              name: pg-synapse
          - name: synapse_b
            login: true
            passwordSecret:
              name: pg-synapse-b
          - name: synapse_c
            login: true
            passwordSecret:
              name: pg-synapse-c
          - name: synapse_d
            login: true
            passwordSecret:
              name: pg-synapse-d
          - name: kagent
            login: true
            passwordSecret:
              name: pg-kagent
          - name: keycloak
            login: true
            passwordSecret:
              name: pg-keycloak
      # The knowledge roles remain base DatabaseRole resources; duplicating them in this legacy
      # managed-role replacement would give two controllers authority over the same roles.
      - op: replace
        path: /spec/postgresql/pg_hba
        value:
          - hostssl synapse synapse all scram-sha-256
          - hostssl synapse_b synapse_b all scram-sha-256
          - hostssl synapse_c synapse_c all scram-sha-256
          - hostssl synapse_d synapse_d all scram-sha-256
          - hostssl kagent kagent all scram-sha-256
          - hostssl keycloak keycloak all scram-sha-256
          - hostssl knowledge knowledge_owner all scram-sha-256
          - hostssl knowledge knowledge_retrieval all scram-sha-256
          - hostssl all all all reject
          - hostnossl all all all reject
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: ScheduledBackup
      name: platform-pg-nightly
      namespace: postgres
    patch: |
      $patch: delete
      apiVersion: postgresql.cnpg.io/v1
      kind: ScheduledBackup
      metadata:
        name: platform-pg-nightly
        namespace: postgres
  - target: { group: postgresql.cnpg.io, version: v1, kind: Database, name: mas }
    patch: |
      $patch: delete
      apiVersion: postgresql.cnpg.io/v1
      kind: Database
      metadata:
        name: mas
        namespace: postgres
  - target: { group: postgresql.cnpg.io, version: v1, kind: Database, name: bridge }
    patch: |
      $patch: delete
      apiVersion: postgresql.cnpg.io/v1
      kind: Database
      metadata:
        name: bridge
        namespace: postgres
