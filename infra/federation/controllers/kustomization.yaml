# The federation lab needs only cert-manager, Traefik, and CloudNativePG from infra/flux.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: agentgateway-crds
      namespace: agentgateway-system
    patch: |
      $patch: delete
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: agentgateway-crds
        namespace: agentgateway-system
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: kagent-crds
      namespace: kagent
    patch: |
      $patch: delete
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: kagent-crds
        namespace: kagent
  - target: { group: source.toolkit.fluxcd.io, version: v1, kind: HelmRepository, name: codecentric }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: codecentric
        namespace: flux-system
  - target: { group: source.toolkit.fluxcd.io, version: v1, kind: OCIRepository, name: agentgateway-crds }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: agentgateway-crds
        namespace: flux-system
  - target: { group: source.toolkit.fluxcd.io, version: v1, kind: OCIRepository, name: agentgateway }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: agentgateway
        namespace: flux-system
  - target: { group: source.toolkit.fluxcd.io, version: v1, kind: HelmRepository, name: kagent }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: kagent
        namespace: flux-system
  - target: { group: source.toolkit.fluxcd.io, version: v1, kind: HelmRepository, name: prometheus-community }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: prometheus-community
        namespace: flux-system
  - target: { group: source.toolkit.fluxcd.io, version: v1, kind: HelmRepository, name: open-telemetry }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: open-telemetry
        namespace: flux-system
  - target: { group: source.toolkit.fluxcd.io, version: v1, kind: HelmRepository, name: jaegertracing }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: jaegertracing
        namespace: flux-system
  - target: { group: source.toolkit.fluxcd.io, version: v1, kind: HelmRepository, name: vllm }
    patch: |
      $patch: delete
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: vllm
        namespace: flux-system
