apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: synapse-c
  namespace: matrix-c
spec:
  parentRefs:
    - name: federation-c
      namespace: gateway
      sectionName: https-matrix-c
  hostnames:
    - matrix.${federation_denied_server_name}
  rules:
    - matches:
        - path: { type: PathPrefix, value: /_matrix }
        - path: { type: PathPrefix, value: /_synapse }
      backendRefs:
        - name: ess-synapse
          port: 8008
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: well-known-c
  namespace: matrix-c
spec:
  parentRefs:
    - name: federation-c
      namespace: gateway
      sectionName: https-wellknown-c
  hostnames:
    - ${federation_denied_server_name}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/matrix
      backendRefs:
        - name: ess-well-known
          port: 8010
