# Constrained-host wiring for the federation lab. Each canonical Flux layer retains field
# ownership while the shared Matrix tuning is composed into all three isolated ESS releases.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  # Gateway and platform Secrets may converge in parallel, then expensive workload installs are
  # deliberately serialized to lower the cold-boot memory peak on a single-node laptop.
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: controllers
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../federation/constrained/controllers
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: postgres
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../federation/constrained/postgres
      - op: add
        path: /spec/dependsOn/-
        value:
          name: gateway
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: matrix
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../federation/constrained/matrix
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: matrix-b
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components
        value:
          - ../constrained/matrix
      - op: add
        path: /spec/dependsOn/-
        value:
          name: matrix
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: matrix-c
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components
        value:
          - ../constrained/matrix
      - op: add
        path: /spec/dependsOn/-
        value:
          name: matrix-b
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: keycloak
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../federation/constrained/keycloak
      - op: add
        path: /spec/dependsOn/-
        value:
          name: matrix-c
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: agentgateway
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../../federation/constrained/agentgateway
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: kagent
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../federation/constrained/kagent
