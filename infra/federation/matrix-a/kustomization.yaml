# Convert the canonical Matrix release into homeserver A of the provider-free federation lab.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
components:
  - ../../../apps/synapse-federation-policy
patches:
  # Scope only the namespace-neutral policy objects. A global namespace transformer would also
  # move shared Gateway resources out of their owning namespace when this Component is composed.
  - target:
      version: v1
      kind: ConfigMap
      name: fgentic-synapse-federation-policy-v1
    patch: |
      - op: add
        path: /metadata/namespace
        value: matrix
  - target:
      version: v1
      kind: ConfigMap
      name: fgentic-federation-policy
    patch: |
      - op: add
        path: /metadata/namespace
        value: matrix
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: matrix-stack
      namespace: matrix
    patch: |
      - op: add
        path: /spec/values/storage
        value:
          resourcePolicy: delete
      - op: replace
        path: /spec/values/matrixAuthenticationService
        value:
          enabled: false
      - op: replace
        path: /spec/values/elementWeb
        value:
          enabled: false
      - op: replace
        path: /spec/values/elementAdmin
        value:
          enabled: false
      - op: replace
        path: /spec/values/matrixRTC
        value:
          enabled: false
      - op: replace
        path: /spec/values/synapse/appservices
        value: []
      - op: add
        path: /spec/values/synapse/serviceMonitors
        value:
          enabled: false
      - op: add
        path: /spec/values/synapse/hostAliases
        value:
          - ip: ${federation_gateway_ip}
            hostnames:
              - ${server_name}
              - matrix.${server_name}
              - ${federation_partner_server_name}
              - matrix.${federation_partner_server_name}
              - ${federation_second_partner_server_name}
              - matrix.${federation_second_partner_server_name}
              - ${federation_denied_server_name}
              - matrix.${federation_denied_server_name}
      - op: add
        path: /spec/values/synapse/extraVolumes
        value:
          - name: federation-ca
            configMap:
              name: fgentic-local-ca
              items:
                - key: ca.crt
                  path: ca.crt
            mountContext: both
          - name: federation-policy-module
            configMap:
              name: fgentic-synapse-federation-policy-v1
            mountContext: both
          - name: federation-policy
            configMap:
              name: fgentic-federation-policy
            mountContext: both
      - op: add
        path: /spec/values/synapse/extraVolumeMounts
        value:
          - name: federation-ca
            mountPath: /etc/fgentic-ca
            readOnly: true
            mountContext: both
          - name: federation-policy-module
            mountPath: /opt/fgentic/synapse-modules
            readOnly: true
            mountContext: both
          - name: federation-policy
            mountPath: /etc/fgentic/federation-policy
            readOnly: true
            mountContext: both
      - op: add
        path: /spec/values/synapse/extraEnv
        value:
          - name: PYTHONPATH
            value: /opt/fgentic/synapse-modules
          - name: PYTHONDONTWRITEBYTECODE
            value: "1"
      - op: add
        path: /spec/values/synapse/additional
        value:
          10-federation:
            config: |
              default_room_version: "12"
              federation_domain_whitelist:
                - ${server_name}
                - ${federation_partner_server_name}
                - ${federation_second_partner_server_name}
              federation_custom_ca_list:
                - /etc/fgentic-ca/ca.crt
              ip_range_whitelist:
                - ${federation_gateway_ip}/32
              trusted_key_servers:
                - server_name: ${federation_partner_server_name}
              federation_whitelist_endpoint_enabled: true
          20-federation-policy:
            config: |
              modules:
                - module: fgentic_federation_policy.FederationPolicyModule
                  config:
                    policy_path: /etc/fgentic/federation-policy/policy.json
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: element-web
      namespace: matrix
    patch: |
      $patch: delete
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: element-web
        namespace: matrix
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: matrix-authentication-service
      namespace: matrix
    patch: |
      $patch: delete
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: matrix-authentication-service
        namespace: matrix
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: synapse
      namespace: matrix
    patch: |
      - op: replace
        path: /spec/rules
        value:
          - matches:
              - path: {type: PathPrefix, value: /_matrix}
              - path: {type: PathPrefix, value: /_synapse}
            backendRefs:
              - name: ess-synapse
                port: 8008
