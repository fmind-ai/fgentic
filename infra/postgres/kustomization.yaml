# Shared CloudNativePG cluster + the per-tenant databases. The CNPG operator is a HelmRelease
# (infra/flux); the role-password Secrets are SOPS-encrypted (infra/secrets).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - cluster.yaml
  - databases.yaml
  - scheduledbackup.yaml
