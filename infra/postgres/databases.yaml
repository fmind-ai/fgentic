# A database per stateful tenant, owned by its scoped role. Synapse REQUIRES its database be
# created with C collation (LC_COLLATE/LC_CTYPE=C) — a hard upstream requirement. MAS and the
# bridge (mautrix StateStore) use standard UTF-8. CloudNativePG reconciles these declaratively.
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: synapse
  namespace: postgres
spec:
  cluster:
    name: platform-pg
  name: synapse
  owner: synapse
  encoding: UTF8
  localeCollate: C
  localeCType: C
  template: template0
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: mas
  namespace: postgres
spec:
  cluster:
    name: platform-pg
  name: mas
  owner: mas
  encoding: UTF8
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: bridge
  namespace: postgres
spec:
  cluster:
    name: platform-pg
  name: bridge
  owner: bridge
  encoding: UTF8
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: kagent
  namespace: postgres
spec:
  cluster:
    name: platform-pg
  name: kagent
  owner: kagent
  encoding: UTF8
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: keycloak
  namespace: postgres
spec:
  cluster:
    name: platform-pg
  name: keycloak
  owner: keycloak
  encoding: UTF8
---
# Knowledge-store roles use the first-class CNPG role API so their powerful attributes and
# retention policy remain explicit without extending the Cluster's legacy inline role list.
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: knowledge-owner
  namespace: postgres
spec:
  cluster:
    name: platform-pg
  name: knowledge_owner
  ensure: present
  login: true
  inherit: false
  superuser: false
  createdb: false
  createrole: false
  replication: false
  bypassrls: false
  connectionLimit: 4
  passwordSecret:
    name: pg-knowledge-owner
  databaseRoleReclaimPolicy: retain
---
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: knowledge-retrieval
  namespace: postgres
spec:
  cluster:
    name: platform-pg
  name: knowledge_retrieval
  ensure: present
  login: true
  inherit: false
  superuser: false
  createdb: false
  createrole: false
  replication: false
  bypassrls: false
  connectionLimit: 16
  passwordSecret:
    name: pg-knowledge-retrieval
  databaseRoleReclaimPolicy: retain
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: knowledge
  namespace: postgres
spec:
  cluster:
    name: platform-pg
  name: knowledge
  owner: knowledge_owner
  encoding: UTF8
  databaseReclaimPolicy: retain
  extensions:
    - name: vector
      ensure: present
      version: "0.8.5"
