apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - role.yaml
  - connector-role.yaml
  - knowledge-schema-v2.yaml
  - knowledge-schema-v3.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: platform-pg
      namespace: postgres
    patch: |
      - op: add
        path: /spec/postgresql/pg_hba/6
        value: hostssl knowledge knowledge_ingestion all scram-sha-256
      - op: add
        path: /spec/postgresql/pg_hba/7
        value: hostssl knowledge knowledge_connector all scram-sha-256
