# Optional finite Synapse retention policy for production-shaped profiles. Cluster overlays opt in
# and supply durations through platform-settings; disposable demo/federation profiles stay unchanged.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: matrix-stack
      namespace: matrix
    patch: |
      - op: add
        path: /spec/values/synapse/additional
        value:
          10-retention:
            config: |
              retention:
                enabled: true
                default_policy:
                  max_lifetime: ${matrix_message_retention_default}
                allowed_lifetime_min: ${matrix_message_retention_min}
                allowed_lifetime_max: ${matrix_message_retention_max}
                purge_jobs:
                  # One unbounded job covers every effective max_lifetime without gaps.
                  - interval: ${matrix_message_purge_interval}
              media_retention:
                local_media_lifetime: ${matrix_local_media_retention}
                remote_media_lifetime: ${matrix_remote_media_retention}
              redaction_retention_period: ${matrix_redaction_retention}
              forgotten_room_retention_period: ${matrix_forgotten_room_retention}
