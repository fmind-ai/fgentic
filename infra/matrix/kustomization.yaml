# The Matrix layer: ESS (Synapse + MAS + Element Web + well-known) HelmRelease + the Gateway API
# routes that expose it. The ESS OCIRepository is in infra/flux/sources.yaml; component Secrets
# (pg-synapse, pg-mas, the bridge registration, ESS init secrets) are SOPS (infra/secrets).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrelease.yaml
  - httproutes.yaml
