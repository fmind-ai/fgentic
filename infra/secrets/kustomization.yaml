# SOPS-encrypted platform secrets, applied + decrypted by the "platform-secrets" Flux
# Kustomization (decryption.provider=sops, secretRef=sops-age). Only data/stringData is encrypted.
#
# BOOTSTRAP: the *.sops.yaml files are NOT in git until you generate them —
# `scripts/gen-secrets.sh <server_name>` creates the full consistent set from scratch (fresh
# passwords/tokens, encrypted in place); the *.sops.yaml.example files document each shape.
# ESS also needs a set of init/signing secrets — the ESS chart generates them itself.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - postgres-roles.sops.yaml # ns postgres: pg-synapse / pg-mas / pg-bridge / pg-kagent
  - agentgateway-model.sops.yaml # ns agentgateway-system: the model provider key
  - kagent.sops.yaml # ns kagent: kagent-db connection URL + kagent-model-auth
  - matrix-a2a-bridge-registration.sops.yaml # ns bridge & matrix: the appservice registration
  - matrix-a2a-bridge-db.sops.yaml # ns bridge: the bridge's Postgres connection URL
