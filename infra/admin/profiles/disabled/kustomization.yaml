# Intentionally empty: changing admin_console from enabled to disabled makes Flux prune every
# object previously inventoried by the admin Kustomization.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - placeholder.yaml
patches:
  - target:
      kind: ConfigMap
      name: admin-disabled-placeholder
    patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: admin-disabled-placeholder
