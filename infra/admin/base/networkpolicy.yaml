# The server only returns static files. Matrix and MAS API calls originate in the administrator's
# browser, so the Pod needs no egress and accepts ingress only from the shared Gateway namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ketesa
  namespace: admin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ketesa
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
      ports:
        - protocol: TCP
          port: 8080
  egress: []
