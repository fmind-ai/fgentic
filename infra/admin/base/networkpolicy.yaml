# Fail closed for every Pod in the opt-in admin namespace. This guard is composed only when the
# profile is enabled, so the disabled profile retains zero footprint while an unlabelled Pod gains
# no ambient access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-default-deny
  namespace: admin
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# The server only returns static files. Matrix and MAS API calls originate in the administrator's
# browser, so the Ketesa Pod needs no egress and accepts ingress only from the shared Gateway.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ketesa
  namespace: admin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ketesa
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
      ports:
        - protocol: TCP
          port: 8080
  egress: []
