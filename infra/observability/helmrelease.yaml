# Metrics layer (SPEC §9): Prometheus + Alertmanager + Grafana via kube-prometheus-stack.
# Grafana is served through the shared Gateway at grafana.<server_name>; the admin password is
# chart-generated (kubectl -n monitoring get secret kube-prometheus-stack-grafana). Jaeger has no
# external route: operators inspect its in-cluster query API through this provisioned datasource.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: -1 # self-heal: keep remediating failed installs (GitOps must converge unattended)
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.12.5
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    grafana:
      # Served behind the shared Gateway (HTTPRoute in this directory); no Ingress of its own.
      grafana.ini:
        server:
          root_url: https://grafana.${server_name}
      # Discover the declarative Fgentic dashboards generated by this Kustomization. State the
      # chart defaults explicitly because the ConfigMap label is a repository-level contract.
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
          provider:
            allowUiUpdates: false
      additionalDataSources:
        - name: Jaeger
          uid: jaeger
          type: jaeger
          access: proxy
          url: http://jaeger.monitoring.svc.cluster.local:16686
          editable: false
          jsonData:
            nodeGraph:
              enabled: true
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { cpu: 500m, memory: 512Mi }
    prometheus:
      prometheusSpec:
        retention: 7d
        # Discover every PodMonitor/ServiceMonitor/Rule in the cluster, not only labelled ones —
        # the platform's monitors live in their component namespaces.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests: { cpu: 100m, memory: 512Mi }
          limits: { cpu: "1", memory: 1Gi }
    alertmanager:
      alertmanagerSpec:
        resources:
          requests: { cpu: 10m, memory: 64Mi }
          limits: { cpu: 250m, memory: 128Mi }
