# Metrics layer (SPEC §9): Prometheus + Alertmanager + Grafana via kube-prometheus-stack.
# Grafana is served through the shared Gateway at grafana.<server_name>; the admin password is
# chart-generated (kubectl -n monitoring get secret kube-prometheus-stack-grafana). Jaeger has no
# external route: operators inspect its in-cluster query API through this provisioned datasource.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: -1 # self-heal: keep remediating failed installs (GitOps must converge unattended)
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.17.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    grafana:
      # Served behind the shared Gateway (HTTPRoute in this directory); no Ingress of its own.
      grafana.ini:
        server:
          root_url: https://grafana.${server_name}
      # The subchart's default RBAC is a cluster-wide ClusterRole with get/list/watch on every
      # ConfigMap AND Secret (issue #647). Everything Grafana provisions lives in `monitoring` and
      # no enabled sidecar reads Secrets, so disable the broad generated RBAC and bind the exact
      # namespaced Role in grafana-sidecar-rbac.yaml to this pinned ServiceAccount instead.
      rbac:
        create: false
      serviceAccount:
        create: true
        name: kube-prometheus-stack-grafana
      # Discover the declarative Fgentic dashboards generated by this Kustomization and the chart's
      # own datasource ConfigMaps. Scope both sidecars to `monitoring` ConfigMaps only — never
      # cross-namespace, never Secrets — so the granted Role stays minimal.
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: monitoring
          resource: configmap
          provider:
            allowUiUpdates: false
        datasources:
          enabled: true
          searchNamespace: monitoring
          resource: configmap
      additionalDataSources:
        - name: Jaeger
          uid: jaeger
          type: jaeger
          access: proxy
          url: http://jaeger.monitoring.svc.cluster.local:16686
          editable: false
          jsonData:
            nodeGraph:
              enabled: true
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { cpu: 500m, memory: 512Mi }
    prometheus:
      prometheusSpec:
        retention: 7d
        podMetadata:
          labels:
            fgentic.dev/metrics-reader: prometheus
        # Discover every PodMonitor/ServiceMonitor/Rule in the cluster, not only labelled ones —
        # the platform's monitors live in their component namespaces.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests: { cpu: 100m, memory: 512Mi }
          limits: { cpu: "1", memory: 1Gi }
    alertmanager:
      alertmanagerSpec:
        # Adopt any labelled AlertmanagerConfig as a GLOBAL route (matcherStrategy None keeps it from
        # being auto-scoped to its own namespace). The opt-in alert-delivery profile (issue #456)
        # supplies the sole such config; with the profile disabled none matches, so Alertmanager
        # keeps its default null-receiver posture. Absent entirely in demo/federation (they delete
        # this observability layer).
        alertmanagerConfigSelector:
          matchLabels:
            fgentic.dev/alertmanager-config: "true"
        alertmanagerConfigMatcherStrategy:
          type: None
        resources:
          requests: { cpu: 10m, memory: 64Mi }
          limits: { cpu: 250m, memory: 128Mi }
