# Only the explicitly instrumented workloads may submit OTLP to the central Collector. Keep the
# transport grants exact: agentgateway and kagent use gRPC, while the bridge uses HTTP. Prometheus
# in this namespace may scrape only the Collector's internal telemetry.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: otel-collector
      app.kubernetes.io/name: opentelemetry-collector
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway-proxy
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kagent
              app.kubernetes.io/instance: kagent
              app.kubernetes.io/component: controller
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
          podSelector:
            matchLabels:
              fgentic.dev/agent-zoo: "true"
      ports:
        - { protocol: TCP, port: 4317 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bridge
          podSelector:
            matchLabels:
              app.kubernetes.io/name: matrix-a2a-bridge
              app.kubernetes.io/instance: matrix-a2a-bridge
      ports:
        - { protocol: TCP, port: 4318 }
    - from:
        - podSelector:
            matchLabels:
              fgentic.dev/metrics-reader: prometheus
      ports:
        - { protocol: TCP, port: 8888 }
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: jaeger
              app.kubernetes.io/name: jaeger
      ports:
        - { protocol: TCP, port: 4317 }
---
# Jaeger is an internal backend, not another platform ingress. Only the Collector can ingest
# spans; monitoring peers can query/scrape it for Grafana and Prometheus.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jaeger
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: jaeger
      app.kubernetes.io/name: jaeger
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: otel-collector
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - { protocol: TCP, port: 4317 }
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: kube-prometheus-stack
              app.kubernetes.io/name: grafana
      ports:
        - { protocol: TCP, port: 16686 }
    - from:
        - podSelector:
            matchLabels:
              fgentic.dev/metrics-reader: prometheus
      ports:
        - { protocol: TCP, port: 8888 }
  egress: []
