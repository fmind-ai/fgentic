# Prometheus exposes platform telemetry and a query API. Preserve only Grafana's provisioned
# datasource and the exact Prometheus peers that scrape the web and config-reloader metrics.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      operator.prometheus.io/name: kube-prometheus-stack-prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: kube-prometheus-stack
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 9090
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              fgentic.dev/metrics-reader: prometheus
              operator.prometheus.io/name: kube-prometheus-stack-prometheus
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8080
---
# Alertmanager's API admits alerts and silences. Restrict it to the exact Prometheus and Grafana
# clients rendered by the chart, while retaining same-cluster gossip for future HA replicas.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      alertmanager: kube-prometheus-stack-alertmanager
      app.kubernetes.io/name: alertmanager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              fgentic.dev/metrics-reader: prometheus
              operator.prometheus.io/name: kube-prometheus-stack-prometheus
      ports:
        - protocol: TCP
          port: 9093
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: kube-prometheus-stack
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 9093
    - from:
        - podSelector:
            matchLabels:
              alertmanager: kube-prometheus-stack-alertmanager
              app.kubernetes.io/name: alertmanager
      ports:
        - protocol: TCP
          port: 9094
        - protocol: UDP
          port: 9094
---
# kube-state-metrics exposes cluster inventory only to the exact Prometheus scraper. Its separate
# probe listener has no Pod client, so node-originated health checks need no additional peer rule.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kube-state-metrics
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: kube-prometheus-stack
      app.kubernetes.io/name: kube-state-metrics
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              fgentic.dev/metrics-reader: prometheus
              operator.prometheus.io/name: kube-prometheus-stack-prometheus
      ports:
        - protocol: TCP
          port: 8080
