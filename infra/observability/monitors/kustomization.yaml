# Platform monitors + alert rules — a separate Flux Kustomization (observability-monitors):
# their CRDs come from the kube-prometheus-stack HelmRelease in the parent layer, so they can
# only be dry-run applied after it is Ready.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cert-manager.yaml
  - certificate-alert.yaml
  - cloudnative-pg.yaml
  - flux.yaml
  - postgres-alert.yaml
  - traefik.yaml
  - podmonitors.yaml
  - cost-alert.yaml
  - trivy-alert.yaml
  - canary-alert.yaml
