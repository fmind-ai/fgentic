# Traefik's metrics entrypoint is intentionally absent from its public LoadBalancer Service. Scrape
# the exact chart Pod directly on the named port that the ingress policy reserves for Prometheus.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: traefik
  namespace: gateway
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: traefik-gateway
      app.kubernetes.io/name: traefik
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      scheme: http
