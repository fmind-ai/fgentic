# Scrape the agentgateway data-plane proxy (:15020): per-proxy GenAI metrics — token usage,
# cost, TTFT/TPOT — the platform's LLM budget signal (SPEC §9).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: agentgateway-proxy
  podMetricsEndpoints:
    - port: metrics
---
# vLLM exposes Prometheus metrics on its OpenAI API port; the Service stays cluster-internal and
# the models NetworkPolicy admits only this monitoring namespace plus agentgateway (SPEC §9).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: vllm
  namespace: models
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: vllm
      app.kubernetes.io/component: serving-engine
      app.kubernetes.io/part-of: vllm-stack
  podMetricsEndpoints:
    - port: container-port
      path: /metrics
