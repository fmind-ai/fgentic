# Scrape cert-manager's controller and CA-injector metrics Services on their shared named port.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cert-manager
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - cert-manager
  selector:
    matchLabels:
      app.kubernetes.io/instance: cert-manager
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - cainjector
          - controller
  endpoints:
    - port: http-metrics
      path: /metrics
      scheme: http
---
# The webhook Service names its metrics port differently. Keep a separate exact selector so the
# monitor cannot accidentally attach admission traffic or future cert-manager components.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cert-manager-webhook
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - cert-manager
  selector:
    matchLabels:
      app.kubernetes.io/component: webhook
      app.kubernetes.io/instance: cert-manager
      app.kubernetes.io/name: webhook
  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
