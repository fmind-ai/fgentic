# Scrape only cert-manager's controller and CA-injector metrics Services. The webhook Service also
# exposes :9402, but remains intentionally outside this selector because its Pod shares the
# admission listener whose API-server ingress cannot be isolated portably with NetworkPolicy.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cert-manager
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - cert-manager
  selector:
    matchLabels:
      app.kubernetes.io/instance: cert-manager
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - cainjector
          - controller
  endpoints:
    - port: http-metrics
      path: /metrics
      scheme: http
