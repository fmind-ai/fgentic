# Intentionally empty: changing alert_delivery from enabled to disabled makes Flux prune every
# object previously inventoried by the alert-delivery Kustomization (issue #456).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - placeholder.yaml
patches:
  - target:
      kind: ConfigMap
      name: alert-delivery-disabled-placeholder
    patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: alert-delivery-disabled-placeholder
