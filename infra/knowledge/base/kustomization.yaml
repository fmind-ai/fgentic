apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - embeddings-route.yaml
  - networkpolicy.yaml
  - cronjob.yaml
  - cache-gc.yaml
configMapGenerator:
  - name: knowledge-ingestion-runtime
    namespace: knowledge
    files:
      - ingestion.py
      - connector_runtime.py
      - plan.sql
      - checkpoint.sql
      - write.sql
      - connector-publish.sql
      - connector-claim.sql
      - connector-tombstone.sql
  - name: knowledge-ingestion-cache-gc-runtime
    namespace: knowledge
    files:
      - gc.sql
