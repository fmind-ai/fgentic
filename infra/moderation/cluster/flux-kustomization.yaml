apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: draupnir
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./infra/moderation
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    # The access-token Secret decrypts through platform-secrets; the bot needs a live homeserver.
    - name: platform-secrets
    - name: matrix
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
