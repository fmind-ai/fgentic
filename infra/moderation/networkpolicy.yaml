# Default-deny for the Draupnir pod. Egress is limited to the local homeserver (ESS Synapse
# client-server API) plus cluster DNS — Draupnir talks to no external endpoint, because federated
# policy propagation happens server-side through Synapse, not by direct outbound calls from the
# bot. Ingress is limited to the Matrix namespace reaching the opt-in synapse-http-antispam
# webhook. There is no database egress: Draupnir bot mode uses a local SQLite store, not CNPG.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: draupnir
  namespace: moderation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: draupnir
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Synapse posts synapse-http-antispam callbacks to the web listener when that opt-in is on.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: matrix
      ports:
        - protocol: TCP
          port: 8082
  egress:
    # Cluster DNS resolution — narrowed to CoreDNS pods only (matching every other repo policy),
    # so the moderation pod cannot reach an arbitrary kube-system workload listening on 53.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # ESS Synapse client-server API (the bot's only homeserver dependency).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: matrix
      ports:
        - protocol: TCP
          port: 8008
