# Local k3d cluster for Fgentic. Binds loopback 80/443 to the Traefik/Gateway LoadBalancer so
# Element Web + Synapse + MAS are reachable at their canonical https://*.fgentic.localhost URLs
# (ESS bakes https public URLs into its config — a port suffix would break MAS/Element). Flannel
# CNI does not enforce NetworkPolicy locally (that is a GKE Dataplane-V2 concern) — manifests
# stay identical; the policy is simply inert on k3d.
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: fgentic
servers: 1
agents: 0
image: rancher/k3s:v1.35.5-k3s1
ports:
  - port: 127.0.0.1:80:80
    nodeFilters:
      - loadbalancer
  - port: 127.0.0.1:443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      # Disable k3s's bundled Traefik + servicelb; we install our own Traefik (Gateway API)
      # and use k3d's loadbalancer, matching the GKE Gateway API path.
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      # Tolerate user-namespace/rootless hosts (ChromeOS crostini, rootless Docker) where the
      # kubelet cannot write kernel flags under /proc/sys; harmless on regular Linux.
      - arg: --kubelet-arg=feature-gates=KubeletInUserNamespace=true
        nodeFilters:
          - server:*
      - arg: --kubelet-arg=fail-cgroupv1=false
        nodeFilters:
          - server:*
