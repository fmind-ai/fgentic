# Local k3d cluster for Fgentic. Exposes host ports 8080/8443 through the Traefik/Gateway
# LoadBalancer so Element Web + the Synapse client API are reachable at *.localhost. Flannel
# CNI does not enforce NetworkPolicy locally (that is a GKE Dataplane-V2 concern) — manifests
# stay identical; the policy is simply inert on k3d.
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: fgentic
servers: 1
agents: 0
image: rancher/k3s:v1.31.5-k3s1
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      # Disable k3s's bundled Traefik + servicelb; we install our own Traefik (Gateway API)
      # and use k3d's loadbalancer, matching the GKE Gateway API path.
      - arg: --disable=traefik
        nodeFilters:
          - server:*
