# Namespace compute budgets are created with the Namespaces so later Helm and operator workloads
# cannot bypass accounting during their first reconciliation. The three profiles are deliberately
# broad initial ceilings; tune their platform-settings values only from observed usage. Kubernetes
# system namespaces outside this owned layer remain exempt.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-budget
  namespace: cert-manager
spec:
  hard:
    pods: "${quota_small_pods}"
    requests.cpu: "${quota_small_requests_cpu}"
    requests.memory: "${quota_small_requests_memory}"
    limits.cpu: "${quota_small_limits_cpu}"
    limits.memory: "${quota_small_limits_memory}"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: container-defaults
  namespace: cert-manager
spec:
  limits:
    - type: Container
      # Defaults affect only omitted fields; reviewed workload-specific values still win.
      default:
        cpu: "${quota_default_limit_cpu}"
        memory: "${quota_default_limit_memory}"
      defaultRequest:
        cpu: "${quota_default_request_cpu}"
        memory: "${quota_default_request_memory}"
---
