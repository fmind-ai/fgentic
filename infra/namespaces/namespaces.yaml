# Every platform namespace, owned by ONE early Kustomization that depends only on cluster-scoped
# admission policy. HelmRelease objects cannot be created in a namespace that does not exist yet
# (install.createNamespace only covers the release target), and platform-secrets writes into
# namespaces whose workloads depend on it (circular otherwise).
# PSS: `restricted` where workloads comply; `baseline` where operators need more (documented).
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    fgentic.dev/managed: "true"
    fgentic.dev/image-policy: audit
    fgentic.dev/quota-profile: small
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
