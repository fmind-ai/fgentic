# Every platform namespace, owned by ONE early Kustomization (no dependsOn) so HelmReleases and
# Secrets can land in them regardless of DAG order — HelmRelease objects cannot be created in a
# namespace that does not exist yet (install.createNamespace only covers the release target),
# and platform-secrets writes into namespaces whose workloads depend on it (circular otherwise).
# PSS: `restricted` where workloads comply; `baseline` where operators need more (documented).
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
