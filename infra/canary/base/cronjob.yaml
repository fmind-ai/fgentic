# Scheduled synthetic delegation probe. Success/failure IS the Job outcome — the PrometheusRule
# alerts on kube_job_status_failed and staleness (kube-state-metrics), so a broken delegation plane
# on an idle cluster produces a failing or missing canary Job instead of silence. backoffLimit 0 +
# a bounded activeDeadlineSeconds keep each run to a single, time-boxed attempt; the schedule bounds
# invocation capacity (D7/D8 — this cannot amplify).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: delegation-canary
  namespace: canary
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 180
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: delegation-canary
        spec:
          serviceAccountName: delegation-canary
          automountServiceAccountToken: false
          enableServiceLinks: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: probe
              image: python:3.14-slim@sha256:cea0e6040540fb2b965b6e7fb5ffa00871e632eef63719f0ea54bca189ce14a6
              imagePullPolicy: IfNotPresent
              command: ["python3", "/probe/probe.py"]
              envFrom:
                - configMapRef:
                    name: canary-config
                - secretRef:
                    name: canary-credential
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits: { cpu: 100m, memory: 64Mi }
              volumeMounts:
                - name: probe
                  mountPath: /probe
                  readOnly: true
          volumes:
            - name: probe
              configMap:
                name: canary-probe
