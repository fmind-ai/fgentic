# Intentionally empty: changing synthetic_canary from enabled to disabled makes Flux prune every
# object previously inventoried by the canary Kustomization (issue #454).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - placeholder.yaml
patches:
  - target:
      kind: ConfigMap
      name: canary-disabled-placeholder
    patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: canary-disabled-placeholder
