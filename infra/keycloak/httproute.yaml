# Public OIDC/admin endpoint. TLS terminates at the shared Gateway; Keycloak receives HTTP from
# Traefik and publishes fixed https:// URLs through KC_HOSTNAME.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: fgentic-gateway
      namespace: gateway
      sectionName: https-id
  hostnames:
    - id.${server_name}
  rules:
    - backendRefs:
        - name: keycloak-http
          port: 80
