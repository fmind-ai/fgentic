# Governed LLM egress: consumers (kagent) POST OpenAI-compatible /v1/chat/completions to the
# agentgateway Service; it forwards to the model provider below. The model credential lives ONLY
# here (SOPS `model-secret`), so agents never see the raw key — the single model chokepoint.
# agentgateway supports anthropic / openai / gemini / vertexai / bedrock; swap the provider block
# and the model to retarget without touching any agent. Default here: latest Claude.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: llm
  namespace: agentgateway-system
spec:
  ai:
    provider:
      anthropic:
        model: claude-sonnet-5
  policies:
    auth:
      secretRef:
        name: model-secret
