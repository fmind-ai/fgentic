# Governed LLM egress: consumers (kagent) POST OpenAI-compatible /v1/chat/completions to the
# agentgateway Service; it forwards to Vertex AI (Gemini). No API key anywhere: `auth.gcp {}`
# uses ambient Google credentials — Workload Identity on GKE; on k3d the local overlay patches
# in a secretRef to an ADC JSON Secret (scripts/local-adc.sh, never in git). agentgateway also
# supports anthropic / openai / gemini / bedrock — swap the provider block (and ${llm_model}
# in platform-settings) to retarget without touching any agent.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: llm
  namespace: agentgateway-system
spec:
  ai:
    provider:
      vertexai:
        model: ${llm_model}
        projectId: ${gcp_project}
        region: ${vertex_region}
  policies:
    auth:
      gcp: {}
