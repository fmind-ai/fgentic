# Common agentgateway data plane: the secured (ClusterIP) proxy Gateway and A2A route/backend. A
# selected profile under providers/ adds exactly one governed LLM backend + route. The control
# plane is a HelmRelease (helmrelease.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
  - parameters.yaml
  - gateway.yaml
  - a2a-backend.yaml
  - a2a-route.yaml
  - mcp-backend.yaml
  - mcp-route.yaml
  - mcp-authorization.yaml
  - mcp-audit.yaml
  - tracing-policy.yaml
  - networkpolicy.yaml
