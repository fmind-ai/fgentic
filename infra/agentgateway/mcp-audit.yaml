# Emit one content-free JSON access record for each parsed MCP tool call. apiKey.agent is metadata
# bound to the successfully validated bearer key, not a caller-provided identity header. Arguments,
# results, prompts, Matrix content, and the Authorization header are deliberately not added.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: mcp-tool-audit
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  frontend:
    accessLog:
      filter: 'request.path == "/mcp" && mcp.methodName == "tools/call"'
      attributes:
        add:
          - name: audit.kind
            expression: '"fgentic.mcp_tool_call.v1"'
          - name: fgentic.agent
            expression: apiKey.agent
          - name: mcp.method
            expression: mcp.methodName
          - name: mcp.tool.name
            expression: mcp.tool.name
          - name: mcp.tool.target
            expression: mcp.tool.target
