# OpenAI-compatible LLM route (/v1/*) -> the selected profile's backend. The provider component
# replaces the placeholder below with that backend's metadata.name.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: llm-provider
          group: agentgateway.dev
          kind: AgentgatewayBackend
