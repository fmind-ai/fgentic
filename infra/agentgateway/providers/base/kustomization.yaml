# Shared route component owned and pruned with the selected provider. The replacement binds the
# route to the profile's single backend without duplicating route manifests or interpolating names.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - llm-route.yaml
  - a2a-authorization.yaml
replacements:
  - source:
      group: agentgateway.dev
      version: v1alpha1
      kind: AgentgatewayBackend
      fieldPath: metadata.name
    targets:
      - select:
          group: gateway.networking.k8s.io
          version: v1
          kind: HTTPRoute
          name: llm
          namespace: agentgateway-system
        fieldPaths:
          - spec.rules.0.backendRefs.0.name
  - source:
      group: agentgateway.dev
      version: v1alpha1
      kind: AgentgatewayBackend
      fieldPath: metadata.annotations.[fgentic.dev/model-admission]
    targets:
      - select:
          group: agentgateway.dev
          version: v1alpha1
          kind: AgentgatewayPolicy
          name: a2a-bridge-authorization
          namespace: agentgateway-system
        fieldPaths:
          - spec.traffic.authorization.policy.matchExpressions.1
