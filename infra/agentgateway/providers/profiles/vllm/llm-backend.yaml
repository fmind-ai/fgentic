# Host override keeps the OpenAI-compatible request path unchanged and sends it over plain HTTP
# only inside the cluster. NetworkPolicy, not a model API key, is this backend's trust boundary.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: llm-vllm
  namespace: agentgateway-system
  annotations:
    fgentic.dev/model-admission: >-
      request.method == "GET" || (request.method == "POST" && "x-fgentic-data-classification" in request.headers && ("${llm_model}" == "Qwen/Qwen2.5-0.5B-Instruct" && request.headers["x-fgentic-data-classification"] in ["public", "approved_non_public", "restricted", "regulated"]))
spec:
  ai:
    provider:
      openai:
        model: ${llm_model}
      host: vllm-qwen2-5-0-5b-engine-service.models.svc.cluster.local
      port: 80
