# Selecting this profile makes proxy egress default-deny and permits only its internal data-plane
# dependencies. Keep this aligned with the vLLM profile; only the model backend differs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentgateway-demo-egress
  namespace: agentgateway-system
  annotations:
    # #339 moves this policy to a separately ordered provider-egress owner. Disable garbage
    # collection under the current owner before that inventory handoff so no fail-open gap exists.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agentgateway-proxy
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway
      ports:
        - port: 9978
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: models
          podSelector:
            matchLabels:
              app.kubernetes.io/name: demo-llm
      ports:
        - port: 8080
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kagent
              app.kubernetes.io/instance: kagent
              app.kubernetes.io/component: controller
      ports:
        - port: 8083
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kagent-tools
              app.kubernetes.io/instance: kagent
      ports:
        - port: 8084
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-tool-rate-limit
      ports:
        - port: 8081
          protocol: TCP
