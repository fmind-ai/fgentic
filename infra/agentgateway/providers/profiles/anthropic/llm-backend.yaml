# Native Anthropic egress. agentgateway converts the callers' OpenAI-compatible requests to the
# Messages API, moves its default Bearer credential to x-api-key, and adds anthropic-version.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: llm-anthropic
  namespace: agentgateway-system
  annotations:
    # No governed model-catalog entry exists for this optional profile yet. Discovery is safe;
    # every SendMessage remains denied until the exact model policy is reviewed and cataloged.
    fgentic.dev/model-admission: request.method == "GET"
spec:
  ai:
    provider:
      anthropic:
        model: ${llm_model}
  policies:
    auth:
      secretRef:
        name: anthropic-secret
