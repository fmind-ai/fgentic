# Model identity, residency, classification, and capability policy live only in
# providers/model-catalog.yaml. This object configures the proxy process and must not duplicate
# fields that future admission/routing policy (#339) reads from that governed inventory.
#
# Secure the per-Gateway data-plane proxy. agentgateway hardcodes the generated Service to
# type: LoadBalancer (a PUBLIC L4 LB — an unauthenticated internet-facing LLM/A2A oracle). Force
# it to ClusterIP: the only consumers are in-cluster (the bridge + kagent), so no LB is needed.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: secured
  namespace: agentgateway-system
spec:
  logging:
    level: info
    format: json
  service:
    spec:
      type: ClusterIP # override the hardcoded LoadBalancer — in-cluster only, no public IP
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
---
# Conservative admission ceilings for authenticated MCP tool calls. The rate-limit service
# records fixed-window request admissions only; these values are neither tool execution results
# nor model-token consumption. Both dimensions are evaluated for every parsed tools/call.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-tool-rate-limit
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: mcp-tool-rate-limit
    app.kubernetes.io/component: rate-limit
    app.kubernetes.io/part-of: fgentic
data:
  config.yaml: |
    domain: fgentic-mcp-tools
    descriptors:
      - key: agent_tool
        rate_limit:
          unit: second
          requests_per_unit: ${mcp_tool_burst_per_second}
      - key: agent
        rate_limit:
          unit: hour
          requests_per_unit: ${mcp_agent_calls_per_hour}
