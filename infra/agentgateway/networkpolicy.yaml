# Zero-trust ingress to the agent data plane: only the agent workloads (the bridge in ns `bridge`
# and kagent in ns `kagent`) may reach agentgateway. The exact policy passes isolated kind+Calico
# deny/allow conformance; repeat the active-cluster probe on each target CNI. Combined with the
# ClusterIP Service, this policy restricts other namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentgateway-allow-agents
  namespace: agentgateway-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bridge
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
        # Prometheus scrapes the proxy metrics port (:15020) — without this the observability
        # layer silently loses the gateway's GenAI metrics (SPEC §4 F14).
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
