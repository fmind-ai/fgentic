# Authenticate the managed platform-helper before MCP parsing, then enforce the same five-tool
# allowlist at the gateway's MCP layer. The bearer key is scoped to this route and is distinct from
# both the bridge A2A key and all model-provider credentials.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: platform-helper-mcp-authorization
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: kagent-tools-mcp
  traffic:
    buffer:
      request:
        maxBytes: 64Ki
    apiKeyAuthentication:
      mode: Strict
      secretRef:
        name: mcp-agent-callers
    authorization:
      action: Require
      policy:
        matchExpressions:
          - >-
            apiKey.agent == "platform-helper" &&
            request.path == "/mcp" &&
            request.method in ["POST", "GET", "DELETE"]
    # Rate limits are applied only after strict API-key authentication has bound apiKey.agent.
    # They are independent from any future human-approval token: each accepted tools/call checks
    # both the agent+tool burst ceiling and the broader per-agent hourly ceiling.
    rateLimit:
      conditional:
        - condition: >-
            request.method == "POST" &&
            request.path == "/mcp" &&
            json(request.body).method == "tools/call"
          policy:
            global:
              backendRef:
                group: ""
                kind: Service
                name: mcp-tool-rate-limit
                port: 8081
              failureMode: FailClosed
              domain: fgentic-mcp-tools
              descriptors:
                - entries:
                    - name: agent_tool
                      expression: >-
                        apiKey.agent + ":" + json(request.body).params.name
                  unit: Requests
                - entries:
                    - name: agent
                      expression: apiKey.agent
                  unit: Requests
  backend:
    mcp:
      authorization:
        action: Require
        policy:
          matchExpressions:
            - >-
              apiKey.agent == "platform-helper" &&
              mcp.tool.name in [
                "k8s_get_resources",
                "k8s_describe_resource",
                "k8s_get_events",
                "k8s_get_resource_yaml",
                "k8s_get_pod_logs"
              ]
