# Authenticate the managed platform-helper before MCP parsing, then enforce the same five-tool
# allowlist at the gateway's MCP layer. The bearer key is scoped to this route and is distinct from
# both the bridge A2A key and all model-provider credentials.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: platform-helper-mcp-authorization
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: kagent-tools-mcp
  traffic:
    buffer:
      request:
        maxBytes: 64Ki
    apiKeyAuthentication:
      mode: Strict
      secretRef:
        name: mcp-agent-callers
    authorization:
      action: Require
      policy:
        matchExpressions:
          - >-
            apiKey.agent == "platform-helper" &&
            request.path == "/mcp" &&
            request.method in ["POST", "GET", "DELETE"]
    # Rate limits run after strict API-key authentication, but agentgateway's remote-rate-limit
    # CEL context intentionally exposes request data rather than apiKey metadata. Hash the
    # validated bearer so Redis receives a stable per-Agent pseudonym, never the credential.
    # Authorization still binds the readable apiKey.agent identity independently.
    rateLimit:
      conditional:
        - condition: >-
            request.method == "POST" &&
            request.path == "/mcp" &&
            json(request.body).method == "tools/call"
          policy:
            global:
              backendRef:
                group: ""
                kind: Service
                name: mcp-tool-rate-limit
                port: 8081
              failureMode: FailClosed
              domain: fgentic-mcp-tools
              descriptors:
                - entries:
                    - name: agent_tool
                      expression: >-
                        sha256.encode(request.headers["authorization"]) + ":" +
                        json(request.body).params.name
                  unit: Requests
                - entries:
                    - name: agent
                      expression: sha256.encode(request.headers["authorization"])
                  unit: Requests
  backend:
    mcp:
      authorization:
        action: Require
        policy:
          matchExpressions:
            - >-
              apiKey.agent == "platform-helper" &&
              mcp.tool.name in [
                "k8s_get_resources",
                "k8s_describe_resource",
                "k8s_get_events",
                "k8s_get_resource_yaml",
                "k8s_get_pod_logs"
              ]
