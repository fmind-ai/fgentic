# Trace both governed A2A and LLM traffic at the data-plane Gateway. Incoming sampled W3C context
# is always continued; requests without context are sampled too so local acceptance is deterministic.
# Span payloads use agentgateway's defaults and deliberately add no prompts or completions.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: tracing
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  frontend:
    tracing:
      backendRef:
        name: otel-collector
        namespace: monitoring
        port: 4317
      protocol: GRPC
      clientSampling: "true"
      randomSampling: "true"
      resources:
        - name: service.name
          expression: '"agentgateway"'
