# Redis persists fixed-window MCP admission counters across pod restarts. A rate-limit backend or
# store outage denies governed calls through AgentgatewayPolicy.failureMode=FailClosed.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-tool-rate-limit-redis
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: mcp-tool-rate-limit-redis
    app.kubernetes.io/component: quota-store
    app.kubernetes.io/part-of: fgentic
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-tool-rate-limit-redis
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: mcp-tool-rate-limit-redis
    app.kubernetes.io/component: quota-store
    app.kubernetes.io/part-of: fgentic
spec:
  selector:
    app.kubernetes.io/name: mcp-tool-rate-limit-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-tool-rate-limit-redis
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: mcp-tool-rate-limit-redis
    app.kubernetes.io/component: quota-store
    app.kubernetes.io/part-of: fgentic
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-tool-rate-limit-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-tool-rate-limit-redis
        app.kubernetes.io/component: quota-store
        app.kubernetes.io/part-of: fgentic
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 999
        runAsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: docker.io/library/redis:8.8.0@sha256:2838d5524559494f6f1cd66e97e76b200d64a633a8614200620755ed395daf32
          args:
            - --save
            - ""
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mcp-tool-rate-limit-redis
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-tool-rate-limit
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: mcp-tool-rate-limit
    app.kubernetes.io/component: rate-limit
    app.kubernetes.io/part-of: fgentic
spec:
  selector:
    app.kubernetes.io/name: mcp-tool-rate-limit
  ports:
    - name: grpc
      port: 8081
      targetPort: grpc
      appProtocol: kubernetes.io/h2c
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-tool-rate-limit
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: mcp-tool-rate-limit
    app.kubernetes.io/component: rate-limit
    app.kubernetes.io/part-of: fgentic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-tool-rate-limit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-tool-rate-limit
        app.kubernetes.io/component: rate-limit
        app.kubernetes.io/part-of: fgentic
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rate-limit
          image: docker.io/envoyproxy/ratelimit:3e085e5b@sha256:70453d5ca820dce0c2939d95a3eeb0f3e64ac083749bc021401c13e4233d1595
          command:
            - /bin/ratelimit
          ports:
            - name: grpc
              containerPort: 8081
            - name: debug
              containerPort: 6070
          env:
            - name: USE_STATSD
              value: "false"
            - name: LOG_LEVEL
              value: info
            - name: RUNTIME_ROOT
              value: /data
            - name: RUNTIME_SUBDIRECTORY
              value: ratelimit
            - name: RUNTIME_IGNOREDOTFILES
              value: "true"
            - name: REDIS_SOCKET_TYPE
              value: tcp
            - name: REDIS_URL
              value: mcp-tool-rate-limit-redis:6379
            - name: TMPDIR
              value: /tmp
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /data/ratelimit/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mcp-tool-rate-limit
        - name: tmp
          emptyDir: {}
---
# Default-deny ingress already selects both quota pods; restrict their egress to the one required
# service hop as well, with DNS allowed only for the rate-limit service's Redis lookup.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-tool-rate-limit
  namespace: agentgateway-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-tool-rate-limit
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway-proxy
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-tool-rate-limit-redis
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-tool-rate-limit-redis
  namespace: agentgateway-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-tool-rate-limit-redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-tool-rate-limit
      ports:
        - protocol: TCP
          port: 6379
  egress: []
