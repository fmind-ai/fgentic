apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: service-exposure.fgentic.dev
  annotations:
    fgentic.dev/cel-cost: constant; exact type, namespace, and name comparisons
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [services]
  validations:
    - expression: '!has(object.spec.type) || object.spec.type in ["ClusterIP", "ExternalName"] || (object.metadata.namespace == "gateway" && object.metadata.name == "traefik" && object.spec.type == "LoadBalancer")'
      message: managed namespaces allow only ClusterIP or ExternalName Services; gateway/traefik is the sole LoadBalancer exception
      reason: Forbidden
    - expression: "!has(object.spec.externalIPs) || size(object.spec.externalIPs) == 0"
      message: managed namespaces forbid externalIPs outside gateway/traefik; gateway/traefik forbids them too
      reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: service-exposure.fgentic.dev
spec:
  policyName: service-exposure.fgentic.dev
  validationActions: [Deny, Audit]
  matchResources:
    namespaceSelector:
      matchLabels:
        fgentic.dev/managed: "true"
