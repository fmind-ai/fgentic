# Keep model acquisition separate from serving: only this short-lived Job may reach public HTTPS;
# the vLLM Pod mounts the completed cache read-only and has no egress allowance.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen2-5-0-5b-model
  namespace: models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen2-5-0-5b-model-loader
  namespace: models
  annotations:
    # Job pod templates are immutable; let Flux replace this Job when a pin changes.
    kustomize.toolkit.fluxcd.io/force: enabled
  labels:
    app.kubernetes.io/name: qwen2-5-0-5b
    app.kubernetes.io/component: model-loader
    app.kubernetes.io/part-of: vllm-stack
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen2-5-0-5b
        app.kubernetes.io/component: model-loader
        app.kubernetes.io/part-of: vllm-stack
    spec:
      serviceAccountName: vllm
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: model-loader
          image: vllm/vllm-openai-cpu:v0.25.1@sha256:6b301f040db8152dfb8ff55e06fd348aa5d0d9a311f58118160c7058262c8628
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -c
          args:
            - |
              import os
              from pathlib import Path

              from huggingface_hub import snapshot_download

              revision = os.environ["MODEL_REVISION"]
              target = Path("/models/qwen2.5-0.5b-instruct")
              marker = target / ".ready"

              if not marker.is_file() or marker.read_text(encoding="utf-8").strip() != revision:
                  snapshot_download(
                      repo_id="Qwen/Qwen2.5-0.5B-Instruct",
                      revision=revision,
                      local_dir=target,
                      max_workers=4,
                  )
                  marker.write_text(f"{revision}\n", encoding="utf-8")
          env:
            - name: HOME
              value: /tmp
            - name: HF_HUB_DISABLE_TELEMETRY
              value: "1"
            # This is the single source pin. Kustomize projects it into the serving Pod template,
            # so changing the snapshot also forces a rollout whose init container waits for it.
            - name: MODEL_REVISION
              value: 7ae557604adf67be50417f59c2c2f167def9a775
          resources:
            requests:
              cpu: 50m
              ephemeral-storage: 64Mi
              memory: 128Mi
            limits:
              cpu: 500m
              ephemeral-storage: 320Mi
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: qwen2-5-0-5b-model
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
