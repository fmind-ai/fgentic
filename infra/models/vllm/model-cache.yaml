# Keep model acquisition separate from serving: only this short-lived Job may reach public HTTPS;
# the vLLM Pod mounts the completed cache read-only and has no egress allowance.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen2-5-0-5b-model
  namespace: models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen2-5-0-5b-model-loader
  namespace: models
  annotations:
    # Job pod templates are immutable; let Flux replace this Job when a pin changes.
    kustomize.toolkit.fluxcd.io/force: enabled
  labels:
    app.kubernetes.io/name: qwen2-5-0-5b
    app.kubernetes.io/component: model-loader
    app.kubernetes.io/part-of: vllm-stack
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen2-5-0-5b
        app.kubernetes.io/component: model-loader
        app.kubernetes.io/part-of: vllm-stack
    spec:
      serviceAccountName: vllm
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: model-loader
          image: vllm/vllm-openai-cpu:v0.25.1@sha256:6b301f040db8152dfb8ff55e06fd348aa5d0d9a311f58118160c7058262c8628
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -c
          args:
            - |
              import os
              import re
              import shutil
              import tempfile
              from pathlib import Path

              from huggingface_hub import snapshot_download

              revision = os.environ["MODEL_REVISION"]
              if re.fullmatch(r"[0-9a-f]{40}", revision) is None:
                  raise SystemExit("MODEL_REVISION must be one full lowercase Git commit")

              root = Path("/models")
              target = root / "qwen2.5-0.5b-instruct"
              marker_value = f"snapshot-v2:{revision}"
              snapshot_prefix = f".{target.name}-{revision}-"
              next_link = root / f".{target.name}.next"
              legacy = root / f".{target.name}.legacy"

              # snapshot_download(local_dir=...) pulls current files but does not delete files
              # removed upstream. Publish a fresh directory so every ready target is one exact pin.
              def remove(path: Path) -> None:
                  if path.is_symlink() or path.is_file():
                      path.unlink()
                  elif path.exists():
                      shutil.rmtree(path)

              def published_snapshot() -> Path | None:
                  if not target.is_symlink():
                      return None
                  try:
                      snapshot = target.resolve(strict=True)
                  except (OSError, RuntimeError):
                      return None
                  marker = snapshot / ".ready"
                  if (
                      snapshot.parent != root
                      or not snapshot.name.startswith(snapshot_prefix)
                      or not snapshot.name.endswith(".snapshot")
                      or not marker.is_file()
                      or marker.read_text(encoding="utf-8").strip() != marker_value
                  ):
                      return None
                  return snapshot

              # A pod can be terminated after moving a legacy directory but before publishing
              # its replacement symlink. Restore that last known-good tree before any retry.
              if not target.exists() and not target.is_symlink() and legacy.exists():
                  if legacy.is_symlink() or not legacy.is_dir():
                      raise SystemExit("orphaned legacy model cache is not a directory")
                  legacy.rename(target)

              current = published_snapshot()
              if current is None:
                  snapshot = Path(
                      tempfile.mkdtemp(prefix=snapshot_prefix, suffix=".snapshot", dir=root)
                  )
                  migrated = False
                  published = False
                  try:
                      snapshot_download(
                          repo_id="Qwen/Qwen2.5-0.5B-Instruct",
                          revision=revision,
                          local_dir=snapshot,
                          max_workers=4,
                      )
                      (snapshot / ".ready").write_text(f"{marker_value}\n", encoding="utf-8")
                      remove(next_link)
                      next_link.symlink_to(snapshot.name, target_is_directory=True)
                      if target.exists() and not target.is_symlink():
                          remove(legacy)
                          target.rename(legacy)
                          migrated = True
                      os.replace(next_link, target)
                      published = True
                  except BaseException:
                      remove(next_link)
                      if migrated and not target.exists() and legacy.exists():
                          legacy.rename(target)
                      if not published:
                          remove(snapshot)
                      raise

                  current = published_snapshot()
                  if current is None:
                      raise SystemExit("published model snapshot failed validation")

              for candidate in root.glob(f".{target.name}-*.snapshot"):
                  if candidate != current:
                      remove(candidate)
              remove(root / f".{target.name}.legacy")
          env:
            - name: HOME
              value: /tmp
            - name: HF_HUB_DISABLE_TELEMETRY
              value: "1"
            # This is the single source pin. Kustomize projects it into the serving Pod template,
            # so changing the snapshot also forces a rollout whose init container waits for it.
            - name: MODEL_REVISION
              value: 7ae557604adf67be50417f59c2c2f167def9a775
          resources:
            requests:
              cpu: 50m
              ephemeral-storage: 64Mi
              memory: 128Mi
            limits:
              cpu: 500m
              ephemeral-storage: 320Mi
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: qwen2-5-0-5b-model
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
