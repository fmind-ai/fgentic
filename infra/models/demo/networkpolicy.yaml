apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-llm-default-deny
  namespace: models
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: demo-llm
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-llm-allow-agentgateway
  namespace: models
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: demo-llm
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway-proxy
      ports:
        - port: 8080
          protocol: TCP
