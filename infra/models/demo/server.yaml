apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-llm
  namespace: models
data:
  response.txt: |
    Fgentic's deterministic evaluation model is working through agentgateway and kagent.
  server.py: |
    import json
    import os
    import threading
    import time
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from pathlib import Path
    from typing import Any, cast

    SOURCE_DIR = Path(os.environ.get("SOURCE_DIR", "/app"))
    RESPONSE_TEXT = (SOURCE_DIR / "response.txt").read_text(encoding="utf-8").strip()
    ATTRIBUTION_LOG = os.environ.get("ATTRIBUTION_LOG")
    # Bound the raw body; cap concurrent parsers separately to contain JSON expansion under the
    # pod's 64 MiB memory limit.
    MAX_REQUEST_BYTES = 1_048_576
    MAX_CONCURRENT_REQUESTS = 4
    REQUEST_TIMEOUT_SECONDS = 5.0


    def reject_json_constant(_constant: str) -> None:
        raise ValueError


    class BoundedThreadingHTTPServer(ThreadingHTTPServer):
        def __init__(
            self,
            server_address: tuple[str, int],
            handler_class: type[BaseHTTPRequestHandler],
        ) -> None:
            super().__init__(server_address, handler_class)
            self._request_slots = threading.BoundedSemaphore(MAX_CONCURRENT_REQUESTS)

        def process_request(self, request: Any, client_address: Any) -> None:
            # Acquire before ThreadingMixIn allocates a thread, leaving excess connections under
            # the server/kernel listen backlog instead of growing process memory.
            self._request_slots.acquire()
            try:
                super().process_request(request, client_address)
            except BaseException:
                self._request_slots.release()
                raise

        def process_request_thread(self, request: Any, client_address: Any) -> None:
            try:
                super().process_request_thread(request, client_address)
            finally:
                self._request_slots.release()


    class Handler(BaseHTTPRequestHandler):
        # Bound idle request-line/header reads; body reads also enforce this as a wall-clock limit.
        timeout = REQUEST_TIMEOUT_SECONDS

        def log_message(self, format: str, *args: Any) -> None:
            return

        def write_json(self, status: int, document: dict[str, Any]) -> None:
            body = json.dumps(document, separators=(",", ":")).encode()
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def request_size(self) -> int | None:
            content_lengths = self.headers.get_all("Content-Length", [])
            if not content_lengths:
                self.write_json(411, {"error": {"message": "Content-Length is required"}})
                return None
            if (
                len(content_lengths) != 1
                or not content_lengths[0].isascii()
                or not content_lengths[0].isdecimal()
                or bool(self.headers.get_all("Transfer-Encoding", []))
            ):
                self.write_json(400, {"error": {"message": "invalid Content-Length"}})
                return None

            # Normalize before int() so an oversized decimal header cannot hit Python's digit cap.
            normalized_length = content_lengths[0].lstrip("0") or "0"
            if len(normalized_length) > len(str(MAX_REQUEST_BYTES)):
                self.write_json(413, {"error": {"message": "request body too large"}})
                return None

            size = int(normalized_length)
            if size > MAX_REQUEST_BYTES:
                self.write_json(413, {"error": {"message": "request body too large"}})
                return None
            return size

        def read_body(self, size: int) -> bytes | None:
            deadline = time.monotonic() + REQUEST_TIMEOUT_SECONDS
            body = bytearray(size)
            view = memoryview(body)
            received = 0

            try:
                while received < size:
                    remaining = deadline - time.monotonic()
                    if remaining <= 0:
                        raise TimeoutError
                    self.connection.settimeout(remaining)
                    read = self.rfile.readinto1(view[received:])
                    if read == 0:
                        self.close_connection = True
                        self.write_json(400, {"error": {"message": "incomplete request body"}})
                        return None
                    received += read
            except TimeoutError:
                self.connection.settimeout(self.timeout)
                self.close_connection = True
                self.write_json(408, {"error": {"message": "request body timed out"}})
                return None
            finally:
                self.connection.settimeout(self.timeout)

            return bytes(body)

        def do_GET(self) -> None:
            if self.path in ("/health", "/healthz"):
                self.write_json(200, {"status": "ok"})
                return
            if self.path == "/v1/models":
                self.write_json(
                    200,
                    {
                        "object": "list",
                        "data": [
                            {
                                "id": "fgentic-demo",
                                "object": "model",
                                "owned_by": "fgentic",
                            }
                        ],
                    },
                )
                return
            self.write_json(404, {"error": {"message": "not found"}})

        def do_POST(self) -> None:
            if self.path != "/v1/chat/completions":
                self.write_json(404, {"error": {"message": "not found"}})
                return

            size = self.request_size()
            if size is None:
                return
            body = self.read_body(size)
            if body is None:
                return

            try:
                untrusted_request: Any = json.loads(body, parse_constant=reject_json_constant)
            # The bytes decoder also raises ValueError for invalid UTF-8, integer limits, and
            # rejected non-finite constants; RecursionError covers excessive nesting.
            except (RecursionError, ValueError):
                self.write_json(400, {"error": {"message": "invalid JSON"}})
                return
            if not isinstance(untrusted_request, dict):
                self.write_json(400, {"error": {"message": "request must be an object"}})
                return
            request = cast(dict[str, Any], untrusted_request)

            # X-User-Id is forwarded attribution, never an authorization decision. The optional
            # local test log proves the golden runner sent it without changing request handling.
            if ATTRIBUTION_LOG:
                with Path(ATTRIBUTION_LOG).open("a", encoding="utf-8") as log:
                    log.write(json.dumps({"user_id": self.headers.get("X-User-Id")}) + "\n")

            model = request.get("model", "fgentic-demo")
            if not isinstance(model, str) or not model:
                self.write_json(400, {"error": {"message": "model must be a string"}})
                return
            if request.get("stream"):
                chunks: tuple[dict[str, Any], ...] = (
                    {
                        "id": "chatcmpl-fgentic-demo",
                        "object": "chat.completion.chunk",
                        "created": 0,
                        "model": model,
                        "choices": [{"index": 0, "delta": {"role": "assistant"}, "finish_reason": None}],
                    },
                    {
                        "id": "chatcmpl-fgentic-demo",
                        "object": "chat.completion.chunk",
                        "created": 0,
                        "model": model,
                        "choices": [{"index": 0, "delta": {"content": RESPONSE_TEXT}, "finish_reason": None}],
                    },
                    {
                        "id": "chatcmpl-fgentic-demo",
                        "object": "chat.completion.chunk",
                        "created": 0,
                        "model": model,
                        "choices": [{"index": 0, "delta": {}, "finish_reason": "stop"}],
                    },
                    {
                        "id": "chatcmpl-fgentic-demo",
                        "object": "chat.completion.chunk",
                        "created": 0,
                        "model": model,
                        "choices": [],
                        "usage": {"prompt_tokens": 1, "completion_tokens": 1, "total_tokens": 2},
                    },
                )
                self.send_response(200)
                self.send_header("Content-Type", "text/event-stream")
                self.send_header("Cache-Control", "no-cache")
                self.end_headers()
                for chunk in chunks:
                    self.wfile.write(f"data: {json.dumps(chunk, separators=(',', ':'))}\n\n".encode())
                self.wfile.write(b"data: [DONE]\n\n")
                return

            self.write_json(
                200,
                {
                    "id": "chatcmpl-fgentic-demo",
                    "object": "chat.completion",
                    "created": 0,
                    "model": model,
                    "choices": [
                        {
                            "index": 0,
                            "message": {"role": "assistant", "content": RESPONSE_TEXT},
                            "finish_reason": "stop",
                        }
                    ],
                    "usage": {"prompt_tokens": 1, "completion_tokens": 1, "total_tokens": 2},
                },
            )


    server = BoundedThreadingHTTPServer((os.environ.get("HOST", "0.0.0.0"), int(os.environ.get("PORT", "8080"))), Handler)
    if port_file := os.environ.get("PORT_FILE"):
        Path(port_file).write_text(str(server.server_address[1]), encoding="utf-8")
    server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-llm
  namespace: models
  labels:
    app.kubernetes.io/name: demo-llm
    app.kubernetes.io/part-of: fgentic
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-llm
        app.kubernetes.io/part-of: fgentic
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          # Multi-architecture manifest digest for Python 3.14.6 slim, pinned for reproducibility.
          image: python:3.14-slim@sha256:cea0e6040540fb2b965b6e7fb5ffa00871e632eef63719f0ea54bca189ce14a6
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -B
            - /app/server.py
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: source
              mountPath: /app
              readOnly: true
      volumes:
        - name: source
          configMap:
            name: demo-llm
---
apiVersion: v1
kind: Service
metadata:
  name: demo-llm
  namespace: models
  labels:
    app.kubernetes.io/name: demo-llm
spec:
  selector:
    app.kubernetes.io/name: demo-llm
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
