# The chart's generated ClusterRole is intentionally disabled. Keep workload and report access
# namespaced by binding this reusable role only in the 12 platform-owned namespaces.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy-operator
  namespace: trivy-system
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-operator-target
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      # Deployments are read when deciding whether a ReplicaSet is the active revision.
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - aquasecurity.github.io
    resources:
      - vulnerabilityreports
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  # Metrics and controller-runtime owner watches list these report kinds even when their scanners
  # are disabled. They remain read-only; a vulnerability-only install must never create them.
  - apiGroups:
      - aquasecurity.github.io
    resources:
      - configauditreports
      - exposedsecretreports
      - infraassessmentreports
      - rbacassessmentreports
      - sbomreports
    verbs:
      - list
      - watch
---
# Findings metrics unconditionally list these two cluster-scoped report kinds. This is the only
# cluster-wide object read granted to the operator.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-operator-cluster-reports
rules:
  - apiGroups:
      - aquasecurity.github.io
    resources:
      - clustercompliancereports
      - clusterrbacassessmentreports
    verbs:
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trivy-operator-cluster-reports
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trivy-operator-cluster-reports
subjects:
  - kind: ServiceAccount
    name: trivy-operator
    namespace: trivy-system
---
# Runtime writes are confined to trivy-system, where scan Jobs are centralized. A non-zero
# scanJobTTL delegates Job deletion to Kubernetes' TTL-after-finished controller.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trivy-operator-runtime
  namespace: trivy-system
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - get
      - list
      - watch
  # The operator always attempts this create before accepting AlreadyExists. Kubernetes cannot
  # constrain create by resourceNames, so keep it in its own namespace-only rule.
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - trivy-operator
      - trivy-operator-trivy-config
    verbs:
      - get
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
  # MultiNamespace mode always adds the operator namespace to its cache for centralized Jobs.
  # Its install-mode predicate excludes these workloads from scanning, so cache reads belong to
  # this runtime Role without adding report mutation or a thirteenth target RoleBinding.
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - aquasecurity.github.io
    resources:
      - vulnerabilityreports
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - aquasecurity.github.io
    resources:
      - configauditreports
      - exposedsecretreports
      - infraassessmentreports
      - rbacassessmentreports
      - sbomreports
    verbs:
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  # The chart enables leader election only when replicas exceed one. Keep the scale-up path
  # bounded to the one fixed Lease; Event aggregation can use patch after the initial create.
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    resourceNames:
      - trivyoperator-lock
    verbs:
      - get
      - update
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trivy-operator-runtime
  namespace: trivy-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trivy-operator-runtime
subjects:
  - kind: ServiceAccount
    name: trivy-operator
    namespace: trivy-system
