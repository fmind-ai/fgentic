# PROD (Gateway API) web config: namespace, Let's Encrypt ClusterIssuers, the multi-SAN TLS
# Gateway, and the HTTP->HTTPS redirect. Traefik itself is a HelmRelease (infra/flux). Local k3d
# uses gateway-dev.yaml instead (HTTP-only), applied out of band.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - cluster-issuer.yaml
  - gateway.yaml
  - redirect.yaml
