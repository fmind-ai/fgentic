# The shared web Gateway — identical for every environment; only ${server_name} and
# ${cluster_issuer} come from platform-settings (letsencrypt-prod on GCP, local-ca on k3d).
# cert-manager watches the annotation and provisions the single multi-SAN `matrix-tls` Secret
# (SANs: apex + chat/matrix/auth/id/grafana). ACME HTTP-01 cannot issue wildcards, so listeners are
# per-host; every HTTPS listener references the one `matrix-tls` secret, so cert-manager issues
# a single certificate covering all of them.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: fgentic-gateway
  namespace: gateway
  annotations:
    cert-manager.io/cluster-issuer: ${cluster_issuer}
spec:
  gatewayClassName: traefik
  # Delegate each hostname only to its Git-owned route namespace. The immutable namespace-name
  # label keeps route attachment fail-closed without granting namespace relabelling authority.
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
    # Apex — serves /.well-known/matrix/{client,server} delegation so user IDs are @name:${server_name}.
    - name: https-wellknown
      protocol: HTTPS
      port: 443
      hostname: ${server_name}
      tls:
        mode: Terminate
        certificateRefs:
          - name: matrix-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: matrix
    # Element Web.
    - name: https-chat
      protocol: HTTPS
      port: 443
      hostname: chat.${server_name}
      tls:
        mode: Terminate
        certificateRefs:
          - name: matrix-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: matrix
    # Synapse (Matrix Client-Server + federation API).
    - name: https-matrix
      protocol: HTTPS
      port: 443
      hostname: matrix.${server_name}
      tls:
        mode: Terminate
        certificateRefs:
          - name: matrix-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: matrix
    # Matrix Authentication Service (OIDC).
    - name: https-auth
      protocol: HTTPS
      port: 443
      hostname: auth.${server_name}
      tls:
        mode: Terminate
        certificateRefs:
          - name: matrix-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: matrix
    # Optional reference IdP (Keycloak).
    - name: https-id
      protocol: HTTPS
      port: 443
      hostname: id.${server_name}
      tls:
        mode: Terminate
        certificateRefs:
          - name: matrix-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
    # Grafana (observability layer).
    - name: https-grafana
      protocol: HTTPS
      port: 443
      hostname: grafana.${server_name}
      tls:
        mode: Terminate
        certificateRefs:
          - name: matrix-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
