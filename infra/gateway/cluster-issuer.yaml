# Let's Encrypt ClusterIssuers — portable ACME TLS (no cloud-managed cert service). HTTP-01 is
# solved through the Gateway API (a temporary HTTPRoute on fgentic-gateway). Use staging first to
# avoid rate limits, then switch the Gateway annotation to letsencrypt-prod.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: mederic.hurier@fmind.dev
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: fgentic-gateway
                namespace: gateway
                kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mederic.hurier@fmind.dev
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: fgentic-gateway
                namespace: gateway
                kind: Gateway
