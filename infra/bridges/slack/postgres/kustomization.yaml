# Opt-in component rendered inside the canonical Postgres Flux Kustomization. This keeps one field
# owner for platform-pg and composes with other bridge components.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - database.yaml
patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: platform-pg
      namespace: postgres
    patch: |
      - op: add
        path: /spec/managed/roles/-
        value:
          name: slackbridge
          login: true
          passwordSecret:
            name: pg-slackbridge
      - op: add
        path: /spec/postgresql/pg_hba/0
        value: hostssl slackbridge slackbridge all scram-sha-256
