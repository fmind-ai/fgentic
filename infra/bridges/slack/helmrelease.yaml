# Optional Slack interop layer. Enable it only through this profile's cluster/ component; the
# default local and GCP overlays do not reconcile its runtime, Matrix, Postgres, or A2A patches.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-slack
  namespace: bridges
spec:
  interval: 30m
  timeout: 5m
  releaseName: mautrix-slack
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  chart:
    spec:
      chart: ./infra/bridges/chart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    nameOverride: mautrix-slack
    image:
      # Latest stable upstream release on 2026-07-11: v0.2606.0, commit
      # 813cabaa9382a07ac3515b0dbc484fb0fe138385. Pin the multi-arch registry manifest.
      repository: dock.mau.dev/mautrix/slack
      digest: sha256:f1de44e723a13484a6b09a26b93127e494c25a70d4d21c2300bfddf49a7dae03
      pullPolicy: IfNotPresent
    bridge:
      # Bypassing upstream's root startup script is its documented Kubernetes path: no chown,
      # registration mutation, or config rewrite is needed at runtime.
      command:
        - /usr/bin/mautrix-slack
      args:
        - --config
        - /data/config.yaml
        - --no-update
      port: 29335
    service:
      port: 29335
    secret:
      name: mautrix-slack
      mountPath: /run/secrets/mautrix-slack
    env:
      - name: MAUTRIX_SLACK_DATABASE__URI_FILE
        value: /run/secrets/mautrix-slack/database-uri
      - name: MAUTRIX_SLACK_APPSERVICE__AS_TOKEN_FILE
        value: /run/secrets/mautrix-slack/as-token
      - name: MAUTRIX_SLACK_APPSERVICE__HS_TOKEN_FILE
        value: /run/secrets/mautrix-slack/hs-token
    config:
      # Exact bridge-v2 schema generated by v0.2606.0 (`mautrix-slack -e`). Fields with secrets
      # are overridden from mounted files through env_config_prefix; no `generate` value remains
      # because the process runs read-only with --no-update.
      content: |
        network:
          displayname_template: '{{or .Profile.DisplayName .Profile.RealName .Name}}{{if .IsBot}} (bot){{end}}'
          channel_name_template: '{{if and .IsChannel (not .IsPrivate)}}#{{end}}{{.Name}}{{if .IsNoteToSelf}} (you){{end}}'
          team_name_template: '{{ .Name }}'
          custom_emoji_reactions: true
          workspace_avatar_in_rooms: false
          participant_sync_count: 5
          participant_sync_only_on_create: true
          mute_channels_by_default: false
          backfill:
            # Do not enumerate visible conversations on login. Operators bridge the one approved
            # channel explicitly after completing the Slack app login flow.
            conversation_count: 0
        bridge:
          command_prefix: '!slack'
          personal_filtering_spaces: true
          private_chat_portal_meta: true
          async_events: false
          split_portals: false
          bridge_notices: true
          permissions:
            # Only the A2A appservice identities that can emit platform replies may use the
            # operator's relay login. Every other Matrix identity is blocked by default.
            '*': block
            '@a2a-bridge:${server_name}': relay
            '@agent-docs-qa:${server_name}': relay
            '@agent-platform-helper:${server_name}': relay
            '@agent-scribe:${server_name}': relay
            '@alice:${server_name}': admin
          relay:
            enabled: true
            admin_only: true
            prefer_default: false
            allow_bridge: false
            default_relays: []
            message_formats:
              m.notice: '<b>{{ .Sender.DisambiguatedName }}</b>: {{ .Message }}'
            displayname_format: '{{ .DisambiguatedName }}'
          portal_create_filter:
            # Remote events must not auto-create Matrix portals. The live gate explicitly selects
            # one approved Slack channel, keeping the initial data boundary reviewable.
            mode: allow
            list: []
            always_deny_from_login: []
        database:
          type: postgres
          uri: overridden-from-secret-file
          max_open_conns: 5
          max_idle_conns: 1
        homeserver:
          address: http://ess-synapse.matrix.svc.cluster.local:8008
          domain: ${server_name}
          software: standard
          websocket: false
          retry_limit: 4
        appservice:
          address: http://mautrix-slack.bridges.svc.cluster.local:29335
          hostname: 0.0.0.0
          port: 29335
          id: slack
          bot:
            username: slackbot
            displayname: Slack bridge bot
            avatar: mxc://maunium.net/pVtzLmChZejGxLqmXtQjFxem
          ephemeral_events: true
          async_transactions: false
          as_token: overridden-from-secret-file
          hs_token: overridden-from-secret-file
          username_template: slack_{{.}}
        matrix:
          message_status_events: false
          delivery_receipts: false
          message_error_notices: true
          sync_direct_chat_list: true
          federate_rooms: false
          upload_file_threshold: 5242880
          ghost_extra_profile_info: false
        analytics:
          token: null
        provisioning:
          shared_secret: disable
          allow_matrix_auth: false
          debug_endpoints: false
          enable_session_transfers: false
        public_media:
          enabled: false
          signing_key: disabled
        direct_media:
          enabled: false
          server_key: disabled
        backfill:
          enabled: false
          max_initial_messages: 0
          max_catchup_messages: 0
        double_puppet:
          servers: {}
          allow_discovery: false
          secrets: {}
        encryption:
          allow: false
          default: false
          require: false
          appservice: false
          msc4190: false
          pickle_key: disabled
        env_config_prefix: MAUTRIX_SLACK_
        logging:
          min_level: info
          writers:
            - type: stdout
              format: json
    networkPolicy:
      enabled: true
      homeserver:
        namespace: matrix
        port: 8008
      database:
        namespace: postgres
        port: 5432
        podSelector:
          cnpg.io/cluster: platform-pg
      publicIPv4TLS: true
