# ESS must load the same SOPS registration whose as_token/hs_token are mounted into the bridge.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: matrix-stack
      namespace: matrix
    patch: |
      - op: add
        path: /spec/values/synapse/appservices/-
        value:
          secret: mautrix-slack-registration
          secretKey: registration.yaml
