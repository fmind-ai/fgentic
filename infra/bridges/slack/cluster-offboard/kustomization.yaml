# Replace `cluster` with this temporary phase-one component. It removes runtime, Matrix, and A2A
# integration while keeping the retained role declarative until CNPG applies NOLOGIN.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: postgres
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: ../bridges/slack/postgres-offboard
