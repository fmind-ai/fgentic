# Optional Telegram interop layer. Enable it only through this profile's cluster/ component; the
# default local and GCP overlays do not reconcile its runtime, Matrix, Postgres, or A2A patches.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-telegram
  namespace: bridges
spec:
  interval: 30m
  timeout: 5m
  releaseName: mautrix-telegram
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  chart:
    spec:
      chart: ./infra/bridges/chart
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    nameOverride: mautrix-telegram
    image:
      # Latest stable upstream release on 2026-07-11: v0.2606.0, commit
      # dbcbfc66dec816d56fa3373e93f1a0c8483baa1f. Pin the multi-arch registry manifest.
      repository: dock.mau.dev/mautrix/telegram
      digest: sha256:8c6c559446f049c1f3c4cbc4b284aed14c27aefde9b88a785d262633bdafe510
      pullPolicy: IfNotPresent
    bridge:
      # The documented Kubernetes path bypasses the root startup script and prevents config or
      # registration mutation in the read-only container.
      command:
        - /usr/bin/mautrix-telegram
      args:
        - --config
        - /data/config.yaml
        - --no-update
      port: 29317
    service:
      port: 29317
    secret:
      name: mautrix-telegram
      mountPath: /run/secrets/mautrix-telegram
    env:
      - name: MAUTRIX_TELEGRAM_NETWORK__API_ID_FILE
        value: /run/secrets/mautrix-telegram/api-id
      - name: MAUTRIX_TELEGRAM_NETWORK__API_HASH_FILE
        value: /run/secrets/mautrix-telegram/api-hash
      - name: MAUTRIX_TELEGRAM_DATABASE__URI_FILE
        value: /run/secrets/mautrix-telegram/database-uri
      - name: MAUTRIX_TELEGRAM_APPSERVICE__AS_TOKEN_FILE
        value: /run/secrets/mautrix-telegram/as-token
      - name: MAUTRIX_TELEGRAM_APPSERVICE__HS_TOKEN_FILE
        value: /run/secrets/mautrix-telegram/hs-token
    config:
      # Exact bridge-v2 schema generated by v0.2606.0 (`mautrix-telegram -e`). Every credential
      # is overridden from a mounted file through env_config_prefix; no `generate` value remains.
      content: |
        network:
          api_id: 1
          api_hash: overridden-from-secret-file
          device_info:
            device_model: mautrix-telegram
            system_version: null
            app_version: auto
            lang_code: en
            system_lang_code: en
          animated_sticker:
            target: gif
            convert_from_webm: false
            args:
              width: 256
              height: 256
              fps: 25
          member_list:
            max_initial_sync: 100
            sync_broadcast_channels: false
            skip_deleted: true
          ping:
            interval_seconds: 30
            timeout_seconds: 10
          proxy:
            type: disabled
            address: null
            username: null
            password: null
          sync:
            update_limit: 0
            # Do not materialize a user's recent Telegram history on login. Operators explicitly
            # select the chats they intend to bridge after authentication.
            create_limit: 0
            login_sync_limit: 0
            direct_chats: false
          takeout:
            dialog_sync: false
            forward_backfill: false
            backward_backfill: false
          max_member_count: -1
          contact_avatars: false
          contact_names: false
          always_custom_emoji_reaction: false
          saved_message_avatar: mxc://maunium.net/XhhfHoPejeneOngMyBbtyWDk
          always_tombstone_on_supergroup_migration: false
          image_as_file_pixels: 16777216
          disable_view_once: false
          video_url_preview_as_file: false
          displayname_template: '{{if .Deleted}}Deleted account {{.UserID}}{{else}}{{.FullName}}{{end}}'
        bridge:
          command_prefix: '!tg'
          personal_filtering_spaces: true
          private_chat_portal_meta: true
          async_events: false
          split_portals: false
          # Agent replies are intentionally m.notice events, so this must stay enabled for the
          # Matrix -> Telegram path.
          bridge_notices: true
          permissions:
            # Only the A2A appservice identities that can emit platform replies may use the
            # operator's relay login. Every other Matrix identity is blocked by default.
            '*': block
            '@a2a-bridge:${server_name}': relay
            '@agent-docs-qa:${server_name}': relay
            '@agent-platform-helper:${server_name}': relay
            '@agent-scribe:${server_name}': relay
            '@alice:${server_name}': admin
          relay:
            enabled: true
            admin_only: true
            prefer_default: false
            allow_bridge: false
            default_relays: []
            message_formats:
              m.notice: '<b>{{ .Sender.DisambiguatedName }}</b>: {{ .Message }}'
            displayname_format: '{{ .DisambiguatedName }}'
          # No remote event may materialize a Matrix room until an administrator selects the
          # portal. The bridge command can still plumb an explicit Telegram chat ID.
          portal_create_filter:
            mode: allow
            list: []
            always_deny_from_login: []
        database:
          type: postgres
          uri: overridden-from-secret-file
          max_open_conns: 5
          max_idle_conns: 1
        homeserver:
          address: http://ess-synapse.matrix.svc.cluster.local:8008
          domain: ${server_name}
          software: standard
          websocket: false
          retry_limit: 4
        appservice:
          address: http://mautrix-telegram.bridges.svc.cluster.local:29317
          hostname: 0.0.0.0
          port: 29317
          id: telegram
          bot:
            username: telegrambot
            displayname: Telegram bridge bot
            avatar: mxc://maunium.net/tJCRmUyJDsgRNgqhOgoiHWbX
          ephemeral_events: true
          async_transactions: false
          as_token: overridden-from-secret-file
          hs_token: overridden-from-secret-file
          username_template: telegram_{{.}}
        matrix:
          message_status_events: false
          delivery_receipts: false
          message_error_notices: true
          sync_direct_chat_list: true
          federate_rooms: false
          upload_file_threshold: 5242880
          ghost_extra_profile_info: false
        analytics:
          token: null
        provisioning:
          shared_secret: disable
          allow_matrix_auth: false
          debug_endpoints: false
          enable_session_transfers: false
        public_media:
          enabled: false
          signing_key: disabled
        direct_media:
          enabled: false
          server_key: disabled
        backfill:
          enabled: false
          max_initial_messages: 0
          max_catchup_messages: 0
        double_puppet:
          servers: {}
          allow_discovery: false
          secrets: {}
        encryption:
          allow: false
          default: false
          require: false
          appservice: false
          msc4190: false
          pickle_key: disabled
        env_config_prefix: MAUTRIX_TELEGRAM_
        logging:
          min_level: info
          writers:
            - type: stdout
              format: json
    networkPolicy:
      enabled: true
      homeserver:
        namespace: matrix
        port: 8008
      database:
        namespace: postgres
        port: 5432
        podSelector:
          cnpg.io/cluster: platform-pg
      # The pinned gotd dcs.Prod resolver lists every production DC, including media DCs, on
      # TCP/443 and prefers IPv4. Keep this boundary coupled to the image/source validation.
      publicIPv4TLS: true
