apiVersion: v1
kind: Service
metadata:
  name: {{ include "mautrix-bridge.fullname" . }}
  labels:
    {{- include "mautrix-bridge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  # Upstream checks homeserver -> appservice reachability during startup. Publishing the sole
  # endpoint before readiness avoids a circular dependency without exposing it outside the cluster.
  publishNotReadyAddresses: true
  selector:
    {{- include "mautrix-bridge.selectorLabels" . | nindent 4 }}
  ports:
    - name: appservice
      port: {{ .Values.service.port }}
      targetPort: appservice
      protocol: TCP
