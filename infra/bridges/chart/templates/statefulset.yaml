apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mautrix-bridge.fullname" . }}
  labels:
    {{- include "mautrix-bridge.labels" . | nindent 4 }}
spec:
  # mautrix explicitly does not support concurrent replicas, including during updates.
  replicas: 1
  serviceName: {{ include "mautrix-bridge.fullname" . }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "mautrix-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mautrix-bridge.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ .Values.config.content | sha256sum }}
    spec:
      serviceAccountName: {{ include "mautrix-bridge.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: bridge
          image: "{{ required "image.repository is required" .Values.image.repository }}@{{ required "image.digest is required" .Values.image.digest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.bridge.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.bridge.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          workingDir: /tmp
          ports:
            - name: appservice
              containerPort: {{ .Values.bridge.port }}
              protocol: TCP
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: secret
              mountPath: {{ .Values.secret.mountPath }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /_matrix/mau/live
              port: appservice
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /_matrix/mau/ready
              port: appservice
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /_matrix/mau/live
              port: appservice
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mautrix-bridge.fullname" . }}
        - name: secret
          secret:
            secretName: {{ required "secret.name is required" .Values.secret.name }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmp.sizeLimit | quote }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
