# The kagent platform, co-located with its Agents/ModelConfig (this Kustomization depends on
# `postgres` — the controller runs its DB migrations against the shared CNPG cluster at startup,
# which is why kagent cannot live in the controllers layer).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 30m
  install:
    remediation:
      retries: -1 # self-heal: keep remediating failed installs (GitOps must converge unattended)
  upgrade:
    remediation:
      retries: -1
  # The upstream chart owns the RemoteMCPServer resource, so the post-renderer attaches the
  # reviewed catalog identity without forking the chart. Static coverage fails if a new server
  # appears without its own exact catalog annotation.
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: kagent.dev
              version: v1alpha2
              kind: RemoteMCPServer
              name: kagent-tool-server
            patch: |
              - op: add
                path: /metadata/annotations/fgentic.dev~1mcp-catalog-entry
                value: kagent-tools
  dependsOn:
    - name: kagent-crds
  chart:
    spec:
      chart: kagent
      version: "0.9.11"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  # Model egress THROUGH agentgateway (OpenAI baseUrl -> single credential chokepoint); shared
  # Postgres (no bundled DB). The upstream generic agents are disabled in favor of the smaller
  # declarative zoo in this directory. Its shared Kubernetes tool server is both application-
  # layer read-only and namespaced by RBAC; Secrets remain excluded.
  values:
    providers:
      default: openAI
      openAI:
        provider: OpenAI
        model: ${llm_model}
        apiKeySecretRef: kagent-model-auth
        apiKeySecretKey: OPENAI_API_KEY
        config:
          baseUrl: http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080/v1
    database:
      postgres:
        bundled:
          enabled: false
        urlFile: /var/run/secrets/kagent/url
        vectorEnabled: false
    controller:
      volumes:
        - name: kagent-db
          secret:
            secretName: kagent-db
      volumeMounts:
        - name: kagent-db
          mountPath: /var/run/secrets/kagent
          readOnly: true
    # kagent 0.9.11 rewrites every internal RemoteMCPServer URL in generated agent
    # configuration to this proxy while preserving the MCP path and carrying the
    # original Service hostname in x-kagent-host. The controller still discovers
    # tools directly; only managed agent pods are forced through agentgateway.
    proxy:
      url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080
    otel:
      tracing:
        enabled: true
        exporter:
          otlp:
            endpoint: http://otel-collector.monitoring.svc.cluster.local:4317
            protocol: grpc
            timeout: 15000
            insecure: true
    rbac:
      namespaces:
        - kagent
        - default
    kagent-tools:
      tools:
        image:
          # Pin executable code as well as the advertised MCP surface: either can rug-pull a
          # reviewed backend when only a mutable tag is trusted.
          tag: 0.2.1@sha256:50b431281d3e32666f27a292962fd486aabaac157083a844d037c12137e353aa
        enabledTools:
          - k8s
        args:
          - --read-only
      rbac:
        readOnly: true
        allowSecrets: false
        # Exactly the core namespaces installed by the evaluation profile (issue #22). The
        # upstream chart requires its own install namespace to be present in this list.
        namespaces:
          - agentgateway-system
          - bridge
          - gateway
          - kagent
          - matrix
          - postgres
    # Every enabled agent runs a pod and can spend LLM budget (D7). Keep the broad upstream
    # agents off; infra/kagent/agent-zoo.yaml exposes only the three mapped demo agents.
    k8s-agent: { enabled: false }
    helm-agent: { enabled: false }
    kgateway-agent: { enabled: false }
    istio-agent: { enabled: false }
    promql-agent: { enabled: false }
    observability-agent: { enabled: false }
    argo-rollouts-agent: { enabled: false }
    cilium-policy-agent: { enabled: false }
    cilium-manager-agent: { enabled: false }
    cilium-debug-agent: { enabled: false }
    grafana-mcp: { enabled: false }
    querydoc: { enabled: false }
