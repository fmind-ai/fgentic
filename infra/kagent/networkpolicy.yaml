# kagent's A2A endpoint is UNAUTHENTICATED by default (auth.mode: unsecure, NoopAuthorizer —
# SPEC §4 F11), so this NetworkPolicy is a load-bearing security control. Preserve one all-Pod
# policy so the deletion guard remains meaningful, but bind cross-namespace access to exact callers
# and the pinned controller/tool ports. Same-namespace traffic remains open for generated agent
# runtimes, controller discovery, and KMCP internals. The chart renders no Prometheus monitor;
# future scraping must add an exact Prometheus identity and only its metrics ports. Repeat
# `mise run test:network-policies` on each installed target CNI before acceptance.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kagent-allow-platform
  namespace: kagent
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway-proxy
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bridge
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: matrix-a2a-bridge
              app.kubernetes.io/name: matrix-a2a-bridge
      ports:
        - protocol: TCP
          port: 8083
    # The controller discovers tools directly, while managed agent Pods are forced through this
    # exact proxy identity by the agent-zoo egress policy below.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway-proxy
      ports:
        - protocol: TCP
          port: 8084
    # kagent owns several generated workloads whose internal ports are controller-managed. Keep
    # their existing same-namespace communication without granting another namespace that breadth.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
---
# Sample agents need only DNS, kagent's controller, and agentgateway's model/MCP routes.
# The policy is an impact boundary, not a prompt-injection fix. In particular, docs-qa and scribe
# receive no general internet path. platform-helper cannot dial kagent-tools on :8084 directly;
# agentgateway is the only agent-pod path to that RBAC-scoped server. The controller retains its
# direct discovery path because this policy selects only managed zoo pods. The generic kagent
# conformance is automated; target acceptance must additionally probe direct :8084 denial.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-zoo-egress
  namespace: kagent
spec:
  podSelector:
    matchLabels:
      fgentic.dev/agent-zoo: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kagent
              app.kubernetes.io/instance: kagent
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 8083
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway-proxy
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: otel-collector
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
