# kagent namespace + a ModelConfig (routed through agentgateway) + a sample declarative Agent
# exposed over A2A. The kagent platform itself is a HelmRelease (infra/flux); its model-auth +
# Postgres connection Secrets are SOPS-encrypted (infra/secrets). The chart's built-in k8s-agent
# and helm-agent are enabled in the HelmRelease values and are also reachable over A2A.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
  - networkpolicy.yaml
  - modelconfig.yaml
  - agent-sample.yaml
