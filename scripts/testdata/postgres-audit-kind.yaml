apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      # Rootless Docker/Crostini cannot write host kernel flags from the nested kubelet. This
      # alpha gate is harmless on GitHub's cgroup v2 runners.
      - |
        apiVersion: kubelet.config.k8s.io/v1beta1
        kind: KubeletConfiguration
        featureGates:
          KubeletInUserNamespace: true
