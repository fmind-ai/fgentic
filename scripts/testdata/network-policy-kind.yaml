apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
networking:
  # Calico owns both CNI and policy enforcement in this conformance cluster.
  disableDefaultCNI: true
  podSubnet: 192.168.0.0/16
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      # Rootless Docker/Crostini cannot write host kernel flags from the nested kubelet. This
      # alpha gate is harmless on GitHub's cgroup v2 runners.
      - |
        apiVersion: kubelet.config.k8s.io/v1beta1
        kind: KubeletConfiguration
        featureGates:
          KubeletInUserNamespace: true
      # Constrained hosts may lack br_netfilter, so force Service traffic through conntrack.
      - |
        apiVersion: kubeproxy.config.k8s.io/v1alpha1
        kind: KubeProxyConfiguration
        iptables:
          masqueradeAll: true
