apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: covered
  namespace: caller
spec:
  rules:
    - backendRefs:
        - name: api
          namespace: backend
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-covered
  namespace: backend
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: caller
    - group: agentgateway.dev
      kind: AgentgatewayPolicy
      namespace: caller
  to:
    - group: ""
      kind: Service
      name: api
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: tracing-covered
  namespace: caller
spec:
  frontend:
    tracing:
      backendRef:
        name: api
        namespace: backend
        port: 4317
