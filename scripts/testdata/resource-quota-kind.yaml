apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      # Rootless Docker/Crostini cannot write host kernel flags from the nested kubelet.
      - |
        apiVersion: kubelet.config.k8s.io/v1beta1
        kind: KubeletConfiguration
        featureGates:
          KubeletInUserNamespace: true
      # Constrained hosts may lack br_netfilter, so keep Service replies on the conntrack path.
      - |
        apiVersion: kubeproxy.config.k8s.io/v1alpha1
        kind: KubeProxyConfiguration
        iptables:
          masqueradeAll: true
