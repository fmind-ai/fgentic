apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kustomizations.kustomize.toolkit.fluxcd.io
spec:
  group: kustomize.toolkit.fluxcd.io
  names:
    kind: Kustomization
    listKind: KustomizationList
    plural: kustomizations
    singular: kustomization
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [interval, prune, sourceRef]
              properties:
                suspend:
                  type: boolean
                interval:
                  type: string
                path:
                  type: string
                prune:
                  type: boolean
                sourceRef:
                  type: object
                  required: [kind, name]
                  properties:
                    kind:
                      type: string
                    name:
                      type: string
                postBuild:
                  type: object
                  properties:
                    substitute:
                      type: object
                      additionalProperties:
                        type: string
