run = "bash scripts/test-a2a-authorization.sh --runtime"

[tasks."test:admission-policies"]
description = "Exercise admission denials on an explicitly selected disposable/local cluster"
run = "bash scripts/test-admission-policies.sh --runtime"

[tasks."test:resource-quotas"]
description = "Scale an agent Deployment past quota in an isolated disposable kind cluster"
run = "bash scripts/test-resource-quotas.sh --runtime"

[tasks."test:mcp-governance"]
description = "Exercise MCP authentication, tool filtering, backend routing, and content-free audit records"
run = "bash scripts/test-mcp-governance.sh --runtime"

[tasks."test:kubernetes-audit"]
description = "Patch and read a Secret against an isolated API-audited k3d cluster"
run = "bash scripts/test-kubernetes-audit.sh --runtime"

[tasks."test:postgres-audit"]
description = "Exercise pgAudit and CNPG JSON stdout in an isolated disposable kind cluster"
run = "bash scripts/test-postgres-audit.sh --runtime"

[tasks."test:mautrix-bridges"]
description = "Validate exact pinned mautrix images without contacting external networks"
run = "bash scripts/test-mautrix-bridges.sh --runtime"

[tasks."check:workflows"]
alias = "cw"
description = "Lint GitHub Actions workflows (actionlint)"
run = "actionlint"

[tasks."check:app"]
description = "Run the application's static checks (delegates to apps/matrix-a2a-bridge)"
dir = "apps/matrix-a2a-bridge"
run = "mise run check"

[tasks."check:gateway"]
description = "Run the ActivityPub agent gateway static checks"
dir = "apps/activitypub-agent-gateway"
run = "mise run check"

[tasks."check:policy"]
description = "Run the Synapse federation policy static checks"
dir = "apps/synapse-federation-policy"
run = "mise run check"

[tasks."test:app"]
description = "Run the application test suite (delegates to apps/matrix-a2a-bridge)"
dir = "apps/matrix-a2a-bridge"
run = "mise run test"

[tasks."test:gateway"]
description = "Run the ActivityPub agent gateway test suite"
dir = "apps/activitypub-agent-gateway"
run = "mise run test"

[tasks."test:policy"]
description = "Run the Synapse federation policy unit suite"
dir = "apps/synapse-federation-policy"
run = "mise run test"

[tasks.test]
alias = "t"
description = "Run deterministic application and pinned external-bridge runtime tests"
depends = ["test:app", "test:gateway", "test:policy", "test:mautrix-bridges", "test:kagent-trace-privacy"]

[tasks."test:integration"]
description = "Run the bridge's kind-based Matrix appservice integration test"
dir = "apps/matrix-a2a-bridge"
run = "mise run test:integration"

[tasks."test:availability"]
description = "Run the bridge's graceful-drain and persistent-deduplication scenario"
dir = "apps/matrix-a2a-bridge"
run = "mise run test:availability"

[tasks."test:crash-recovery"]
description = "Run the bridge's durable hard-crash recovery scenario"
dir = "apps/matrix-a2a-bridge"
run = "mise run test:crash-recovery"

[tasks."test:tracing"]
description = "Render the tracing stack and prove an OTLP span reaches Jaeger locally"
run = "bash scripts/test-tracing.sh"

[tasks."test:kagent-trace-privacy"]
description = "Prove the pinned kagent runtime suppresses content in exported traces"
run = "bash scripts/test-kagent-trace-privacy.sh"

[tasks."test:trivy-operator"]
description = "Prove Trivy report creation, metrics, RBAC, bounds, and cleanup in owned k3d"
run = "bash scripts/test-trivy-operator.sh --runtime"

[tasks."test:load"]
description = "Run the bridge dispatcher load regression scenario"
dir = "apps/matrix-a2a-bridge"
run = "mise run test:load"

[tasks."eval:models"]
description = "Evaluate the three sample agents against an approved local model profile"
dir = "apps/matrix-a2a-bridge"
run = "mise run eval:models"

[tasks.build]
alias = "b"
description = "Build all application artifacts"
depends = ["build:bridge", "build:gateway", "build:policy"]

[tasks."build:bridge"]
description = "Build the production bridge image"
dir = "apps/matrix-a2a-bridge"
run = "mise run build:image"

[tasks."build:gateway"]
description = "Build the production ActivityPub agent gateway image"
dir = "apps/activitypub-agent-gateway"
run = "mise run build:image"

[tasks."build:policy"]
description = "Build the standalone Synapse policy package"
dir = "apps/synapse-federation-policy"
run = "mise run build"

[tasks.watch]
alias = "w"
description = "Watch bridge sources and reload them into the lightweight owned dev cluster"
depends = ["dev:up"]
run = """
watchexec --postpone --debounce 500ms \
  --watch apps/matrix-a2a-bridge \
  --filter '*.go' --filter 'go.mod' --filter 'go.sum' --filter 'Dockerfile' \
  -- mise run dev:reload
"""

# --- Local cluster lifecycle (k3d) ---

[tasks."cluster:up"]
description = "Create the local k3d cluster (binds loopback 80/443 for *.fgentic.localhost)"
dir = "infra"
run = """
docker info >/dev/null 2>&1 || { echo "Error: Docker daemon is not running"; exit 1; }
k3d cluster create --config k3d-config.yaml
"""

[tasks."cluster:down"]
description = "Delete the local k3d cluster"
run = "k3d cluster delete fgentic"

[tasks."cluster:overrides"]
description = "Apply the gitignored local platform-settings-overrides (real gcp_project, etc.) and reconcile"
run = """
# The one sanctioned `kubectl apply` outside GitOps: this ConfigMap holds values kept OUT of git
# (e.g. the real gcp_project) and Flux lists it AFTER `platform-settings` in every Kustomization's
# substituteFrom, so its keys win at reconcile. Idempotent — re-run after every cluster recreate.
# See docs/forking.md §5. Absent file is non-fatal: the committed `your-gcp-project` placeholder stays.
override=clusters/local/platform-settings-overrides.yaml
if [ ! -f "$override" ]; then
  echo "No $override yet — copy the template and set your private values (kept out of git):"
  echo "  cp clusters/local/platform-settings-overrides.example.yaml $override"
  echo "Skipping: the committed placeholder (your-gcp-project) stays in effect."
  exit 0
fi
kubectl --context k3d-fgentic apply -f "$override"
# Request an immediate re-render of every layer so the new values take effect. `flux reconcile`
# blocks on full-DAG readiness (can hang on a converging cluster), so annotate directly — this
# returns at once. Post-recreate, the ConfigMap is already present as each layer first reconciles,
# so this is just an accelerator, not a correctness requirement.
kubectl --context k3d-fgentic -n flux-system annotate kustomization --all --overwrite \
  "reconcile.fluxcd.io/requestedAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >/dev/null
echo "Applied platform-settings-overrides and requested a reconcile of all Flux layers."
"""

[tasks."demo:up"]
description = "Install and seed the small evaluation profile without GitHub credentials"
run = "bash scripts/demo.sh up"

[tasks."demo:down"]
description = "Delete only the ephemeral fgentic-demo evaluation cluster"
run = "bash scripts/demo.sh down"

[tasks."dev:up"]
description = "Create once or quickly start the lightweight repo-owned development cluster"
run = "bash scripts/dev.sh up"

[tasks."dev:reload"]
description = "Build and reload only the bridge in the lightweight development cluster"
run = "bash scripts/dev.sh reload"

[tasks."dev:status"]
description = "Show the lightweight development cluster and bridge status"
run = "bash scripts/dev.sh status"

[tasks."dev:stop"]
description = "Stop the lightweight development cluster while preserving state"
run = "bash scripts/dev.sh stop"

[tasks."dev:down"]
description = "Delete only the owned lightweight development cluster"
run = "bash scripts/dev.sh down"

[tasks."fed:up"]
description = "Reconcile and prove the provider-free federation hardening lab"
run = "bash scripts/federation.sh up"

[tasks."fed:down"]
description = "Delete only the owned fgentic-fed federation cluster"
run = "bash scripts/federation.sh down"

[tasks."fed:policy-reload"]
description = "Prove a Flux policy allow/deny reload without restarting Synapse"
run = "bash scripts/reload-federation-policy.sh"

[tasks."fed:tck"]
description = "Run the pinned A2A MUST/JSONRPC TCK against the authenticated federation route"
run = "bash scripts/fed-tck.sh"

[tasks."bridge:load"]
description = "Build and side-load the bridge into the optional full local k3d cluster"
run = """
docker build -t matrix-a2a-bridge:local apps/matrix-a2a-bridge
k3d image import --mode auto --cluster fgentic matrix-a2a-bridge:local
KUBECONFIG="$(mktemp "${TMPDIR:-/tmp}/fgentic-local-kubeconfig.XXXXXX")"
trap 'rm -f "$KUBECONFIG"' EXIT
k3d kubeconfig get fgentic >"$KUBECONFIG"
KUBECONFIG="$KUBECONFIG" kubectl --namespace bridge rollout restart deployment/matrix-a2a-bridge
KUBECONFIG="$KUBECONFIG" kubectl --namespace bridge rollout status \
  deployment/matrix-a2a-bridge --timeout=2m
"""
