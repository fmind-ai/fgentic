run = "bash scripts/test-agent-zoo.sh"

[tasks."check:demo"]
description = "Validate the credential-free demo overlay, lifecycle script, and embedded model"
run = "bash scripts/test-demo.sh"

[tasks."check:federation"]
description = "Validate the offline federation topology, room policy, and denied control"
run = "bash scripts/test-federation.sh"

[tasks."check:federation-onboarding"]
description = "Test the read-only partner federation preflight with offline fixtures"
run = "bash scripts/test-fed-check.sh"

[tasks."check:smoke-workflow"]
description = "Validate nightly demo, policy conformance, diagnostics, and issue tracking"
run = "bash scripts/test-smoke-workflow.sh"

[tasks."check:github-actions"]
