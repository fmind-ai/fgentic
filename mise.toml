run = "bash scripts/test-mautrix-bridges.sh"

[tasks."test:network-policies"]
description = "Probe allow and deny paths on the active reconciled cluster"
run = "bash scripts/test-network-policies.sh"

[tasks."test:network-policies:kind"]
description = "Run policy conformance and its deletion guard in an isolated kind cluster"
run = "bash scripts/test-network-policies-kind.sh"

[tasks."test:a2a-authorization"]
