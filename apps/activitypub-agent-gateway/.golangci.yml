version: "2"
linters:
  default: standard
  enable:
    - errorlint # wrap errors with %w and compare with errors.Is/As
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          disabled: false
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/fmind-ai/activitypub-agent-gateway
