{{- if .Values.networkPolicy.enabled -}}
# Only the Gateway (Traefik) and monitoring namespaces may reach the normal listeners. When the
# private broker is enabled, its explicit source namespaces gain only the internal side port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "activitypub-agent-gateway.fullname" . }}
  labels:
    {{- include "activitypub-agent-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "activitypub-agent-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.fromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.config.listenPort }}
        - protocol: TCP
          port: {{ .Values.config.metricsPort }}
    {{- if .Values.fediverseBroker.enabled }}
    - from:
        {{- range .Values.fediverseBroker.fromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.config.metricsPort }}
    {{- end }}
{{- end }}
