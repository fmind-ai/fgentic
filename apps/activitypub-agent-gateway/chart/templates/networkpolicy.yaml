{{- if .Values.networkPolicy.enabled -}}
# Only the Gateway (Traefik) and monitoring namespaces may reach the gateway: Traefik fronts the
# single exact public AP route, monitoring scrapes /metrics. Egress is left open so the gateway can
# reach the homeserver-independent A2A path (agentgateway/kagent).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "activitypub-agent-gateway.fullname" . }}
  labels:
    {{- include "activitypub-agent-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "activitypub-agent-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.fromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.config.listenPort }}
        - protocol: TCP
          port: {{ .Values.config.metricsPort }}
{{- end }}
