{{- if .Values.httpRoute.enabled -}}
{{- $host := .Values.httpRoute.hostname | default .Values.config.publicHost | default .Values.config.serverName -}}
# One exact public route exposing ONLY the ActivityPub actor/WebFinger/inbox/outbox path prefixes
# (mirrors the fed-lab single-route exposure). No other path reaches the gateway. This route is
# rendered only when httpRoute.enabled is set, which must stay false until the signed federation
# border is in force (docs/fediverse.md §3, issue #211).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "activitypub-agent-gateway.fullname" . }}
  labels:
    {{- include "activitypub-agent-gateway.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.parentRef.name }}
      namespace: {{ .Values.httpRoute.parentRef.namespace }}
      sectionName: {{ .Values.httpRoute.parentRef.sectionName }}
  hostnames:
    - {{ $host | quote }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /.well-known/webfinger
        - path:
            type: PathPrefix
            value: /ap/agents/
      backendRefs:
        - name: {{ include "activitypub-agent-gateway.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
