# The ActivityPub agent gateway deploys from its in-repo Helm chart. It is a SECOND, additive
# federation transport (docs/adr/0014), self-contained and never bundled into the mautrix bridge.
#
# NOT yet wired into the reconciled cluster DAG (clusters/base/apps.yaml): the image is published
# and this unit is enabled only once the signed ActivityPub federation border (issue #211) gates
# public exposure. Until then this manifest is schema-validated but not reconciled — the same
# opt-in posture as the external mautrix bridge profiles. httpRoute stays disabled regardless.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: activitypub-agent-gateway
  namespace: activitypub
spec:
  interval: 30m
  chart:
    spec:
      chart: ./apps/activitypub-agent-gateway/chart
      reconcileStrategy: Revision # redeploy when the chart in git changes
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/fmind-ai/activitypub-agent-gateway
      tag: "0.1.0" # CI overwrites with sha-<git>@sha256:<digest> once the image is published
    config:
      serverName: ${server_name}
    # The federation policy border (issue #211) is ON: the ../component Component projects the
    # fgentic-activitypub-policy ConfigMap this mounts and hot-reloads. Inbound activities must pass
    # HTTP-Signature verification and the allowlist before any A2A call.
    policy:
      enabled: true
    # FEP-8b32 object integrity (issue #212) is ON: outbound replies are signed with the SOPS-backed
    # Ed25519 key and each actor publishes its assertionMethod Multikey, and inbound activities must
    # ALSO carry a valid object proof (requireInbound) — belt-and-suspenders over the transport
    # signature so a relayed or tampered object cannot ride a trusted actor. Requires the
    # activitypub-agent-gateway-signing-key Secret (scripts/gen-secrets.sh).
    integrity:
      enabled: true
      requireInbound: true
    # Per-actor/per-domain token-budget admission (issue #213) is ON: every inbound delegation
    # reserves its token ceiling from the verified actor's/domain's pools (policy.json `budgets`)
    # before any A2A call, deny-by-default for an unbudgeted domain. Reservation ≠ consumption.
    budget:
      enabled: true
    # Public exposure is gated on the border being proven in force (docs/fediverse.md §3): keep the
    # route false until then, even though the border itself is now enabled.
    httpRoute:
      enabled: false
    metrics:
      podMonitor:
        enabled: true # the observability layer provides the CRDs
