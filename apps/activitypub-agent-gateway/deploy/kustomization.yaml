# Flux resource list for the ActivityPub agent gateway app. Reconciled on the DEMO profile by the
# `activitypub` Flux Kustomization (clusters/demo/activitypub.yaml, issue #489); local/gcp keep the
# unit absent. Public exposure stays gated regardless — the border is enabled but httpRoute is off
# until the signed federation border is proven in force (docs/fediverse.md §3). The Namespace is
# applied before the namespaced HelmRelease within this single Kustomization.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: activitypub # project the border's policy ConfigMap into the app namespace
resources:
  - namespace.yaml
  - resource-quotas.yaml
  - networkpolicy.yaml
  - helmrelease.yaml
# The wrapping Flux Kustomization post-build substitutes platform-settings before activation; the
# namespace quota deliberately has no standalone hard-coded profile.
components:
  # The namespace-neutral federation-border allowlist. Projects the mutable
  # fgentic-activitypub-policy ConfigMap that the HelmRelease mounts and hot-reloads.
  - ../component
