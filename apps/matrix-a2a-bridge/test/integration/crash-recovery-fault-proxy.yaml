apiVersion: v1
kind: Service
metadata:
  name: fault-proxy
  namespace: bridge-integration
spec:
  selector:
    app.kubernetes.io/name: fault-proxy
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
    - name: matrix
      port: 8008
      targetPort: matrix
    - name: a2a
      port: 8080
      targetPort: a2a
    - name: control
      port: 8081
      targetPort: control
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fault-proxy
  namespace: bridge-integration
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fault-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fault-proxy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fault-proxy
          image: matrix-a2a-bridge-integration:local
          imagePullPolicy: Never
          command: [/usr/local/bin/fault-proxy]
          ports:
            - containerPort: 5432
              name: postgres
            - containerPort: 8008
              name: matrix
            - containerPort: 8080
              name: a2a
            - containerPort: 8081
              name: control
          readinessProbe:
            httpGet:
              path: /healthz
              port: control
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          resources:
            requests:
              cpu: 5m
              memory: 12Mi
            limits:
              cpu: 100m
              memory: 48Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
