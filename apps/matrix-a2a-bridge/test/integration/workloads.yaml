apiVersion: v1
kind: Service
metadata:
  name: plain-a2a-agent
  namespace: plain-agent
spec:
  selector:
    app.kubernetes.io/name: plain-a2a-agent
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plain-a2a-agent
  namespace: plain-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plain-a2a-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plain-a2a-agent
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: plain-a2a-agent
          image: plain-a2a-agent-integration:local
          imagePullPolicy: Never
          env:
            - name: A2A_STUB_BASE_URL
              value: http://plain-a2a-agent.plain-agent.svc.cluster.local:8080
            - name: A2A_STUB_LOCAL_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: a2aStubLocalBaseURL
                  optional: true
            - name: A2A_STUB_DELAY
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: a2aStubDelay
            - name: A2A_STUB_HOLD
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: a2aStubHold
            - name: A2A_STUB_LONG_HOLD
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: a2aStubLongHold # gitleaks:allow -- ConfigMap field name, not a credential.
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 250m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: plain-a2a-agent
  namespace: plain-agent
spec:
  # The bridge and assertion driver share one disposable namespace: the bridge uses A2A while
  # the driver reads content-free stats and activates the tamper control. No other namespace is
  # admitted, and the deterministic server needs no egress.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: plain-a2a-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bridge-integration
      ports:
        - protocol: TCP
          port: 8080
  egress: []
---
apiVersion: v1
kind: Service
metadata:
  name: bridge
  namespace: bridge-integration
spec:
  selector:
    app.kubernetes.io/name: bridge
  ports:
    - name: appservice
      port: 29331
      targetPort: appservice
    - name: metrics
      port: 9090
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge
  namespace: bridge-integration
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge
    spec:
      automountServiceAccountToken: false
      # The availability scenario sends SIGTERM while an A2A call is held. This budget must exceed
      # both the HTTP intake barrier and the bridge dispatcher drain.
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: matrix-a2a-bridge-integration:local
          imagePullPolicy: Never
          command: [/usr/local/bin/bridge]
          env:
            - name: HOMESERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: homeserverURL
            - name: SERVER_NAME
              value: integration.test
            - name: ACCESS_MANAGER_MXID
              value: "@integration-user:integration.test"
            - name: REGISTRATION_PATH
              value: /config/registration.yaml
            - name: AGENTS_PATH
              value: /agents/agents.yaml
            - name: A2A_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: a2aBaseURL
            - name: AGENT_CARD_REFRESH_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: agentCardRefreshInterval
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: databaseURL
            - name: REQUEST_TIMEOUT
              value: 30s
            - name: TASK_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: taskTimeout
            - name: DEAD_MAN_SWITCH_DELAY
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: deadManSwitchDelay
            - name: SHUTDOWN_TIMEOUT
              value: 25s
            - name: CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: concurrency
            - name: DELEGATION_CLAIM_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: delegationClaimInterval
            - name: DELEGATION_LEASE_DURATION
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: delegationLeaseDuration
            # Optional retry knobs: only the model-outage drill sets these; other scenarios omit the
            # keys and fall back to the bridge defaults (5 attempts, 1s/30s capped backoff).
            - name: DELEGATION_MAX_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: delegationMaxAttempts
                  optional: true
            - name: DELEGATION_RETRY_INITIAL
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: delegationRetryInitial
                  optional: true
            - name: DELEGATION_RETRY_MAX
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: delegationRetryMax
                  optional: true
            - name: SENDER_RATE_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: senderRatePerMinute
            - name: SENDER_RATE_BURST
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: senderRateBurst
            - name: ROOM_RATE_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: roomRatePerMinute
            - name: ROOM_RATE_BURST
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: roomRateBurst
            - name: MAX_TASK_PROGRESS_POSTS
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: maxTaskProgressPosts
            - name: PIN_IN_FLIGHT_TASKS
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: pinInFlightTasks
            - name: CONTROL_CAPACITY_PER_JOB
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: controlCapacityPerJob
            - name: LOG_FORMAT
              value: json
          ports:
            - containerPort: 29331
              name: appservice
            - containerPort: 9090
              name: metrics
          startupProbe:
            httpGet:
              path: /_matrix/mau/ready
              port: appservice
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /_matrix/mau/ready
              port: appservice
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /_matrix/mau/live
              port: appservice
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: agents
              mountPath: /agents
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: matrix-config
        - name: agents
          configMap:
            name: agent-config
