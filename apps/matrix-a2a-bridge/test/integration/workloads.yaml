apiVersion: v1
kind: Service
metadata:
  name: a2a-stub
  namespace: bridge-integration
spec:
  selector:
    app.kubernetes.io/name: a2a-stub
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-stub
  namespace: bridge-integration
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: a2a-stub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: a2a-stub
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: a2a-stub
          image: matrix-a2a-bridge-integration:local
          imagePullPolicy: Never
          command: [/usr/local/bin/a2a-stub]
          env:
            - name: A2A_STUB_DELAY
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: a2aStubDelay
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 250m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: bridge
  namespace: bridge-integration
spec:
  selector:
    app.kubernetes.io/name: bridge
  ports:
    - name: appservice
      port: 29331
      targetPort: appservice
    - name: metrics
      port: 9090
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge
  namespace: bridge-integration
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: matrix-a2a-bridge-integration:local
          imagePullPolicy: Never
          command: [/usr/local/bin/bridge]
          env:
            - name: HOMESERVER_URL
              value: http://synapse:8008
            - name: SERVER_NAME
              value: integration.test
            - name: REGISTRATION_PATH
              value: /config/registration.yaml
            - name: AGENTS_PATH
              value: /agents/agents.yaml
            - name: A2A_BASE_URL
              value: http://a2a-stub:8080
            - name: DATABASE_URL
              value: postgres://postgres@postgres:5432/bridge?sslmode=disable
            - name: REQUEST_TIMEOUT
              value: 10s
            - name: TASK_TIMEOUT
              value: 20s
            - name: CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: concurrency
            - name: SENDER_RATE_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: senderRatePerMinute
            - name: SENDER_RATE_BURST
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: senderRateBurst
            - name: ROOM_RATE_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: roomRatePerMinute
            - name: ROOM_RATE_BURST
              valueFrom:
                configMapKeyRef:
                  name: fixture-settings
                  key: roomRateBurst
            - name: LOG_FORMAT
              value: text
          ports:
            - containerPort: 29331
              name: appservice
            - containerPort: 9090
              name: metrics
          startupProbe:
            httpGet:
              path: /_matrix/mau/ready
              port: appservice
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /_matrix/mau/ready
              port: appservice
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /_matrix/mau/live
              port: appservice
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: agents
              mountPath: /agents
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: matrix-config
        - name: agents
          configMap:
            name: agent-config
