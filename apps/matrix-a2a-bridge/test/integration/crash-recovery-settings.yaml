apiVersion: v1
kind: ConfigMap
metadata:
  name: fixture-settings
  namespace: bridge-integration
data:
  a2aStubDelay: 0s
  a2aStubLongHold: "true"
  a2aBaseURL: http://fault-proxy:8080
  agentCardRefreshInterval: 30s
  concurrency: "2"
  databaseURL: postgres://postgres@fault-proxy:5432/bridge?sslmode=disable
  # Keep lease expiry short enough for six real process replacements on a constrained laptop.
  delegationClaimInterval: 100ms
  delegationLeaseDuration: 3s
  homeserverURL: http://fault-proxy:8008
  senderRatePerMinute: "6000"
  senderRateBurst: "20"
  roomRatePerMinute: "6000"
  roomRateBurst: "20"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fixture-settings
  namespace: plain-agent
data:
  a2aStubDelay: 0s
  a2aStubHold: "false"
  # The local AgentCard must keep SDK calls on the fault-injection path. The separately signed
  # remote card retains its direct endpoint so startup trust verification remains unchanged.
  a2aStubLocalBaseURL: http://fault-proxy.bridge-integration.svc.cluster.local:8080
  # The driver releases the task only after replacing a bridge that was blocked in tasks/get.
  a2aStubLongHold: "true"
