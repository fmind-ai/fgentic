apiVersion: batch/v1
kind: Job
metadata:
  name: integration-driver
  namespace: bridge-integration
spec:
  activeDeadlineSeconds: 90
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: integration-driver
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: driver
          image: matrix-a2a-bridge-integration:local
          imagePullPolicy: Never
          command: [/usr/local/bin/integration-driver]
          env:
            - name: MATRIX_URL
              value: http://synapse:8008
            - name: BRIDGE_URL
              value: http://bridge:29331
            - name: MATRIX_SERVER_NAME
              value: integration.test
            - name: BRIDGE_HS_TOKEN
              value: integration-homeserver-token
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 250m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
