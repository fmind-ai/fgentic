apiVersion: v1
kind: ConfigMap
metadata:
  name: fixture-settings
  namespace: bridge-integration
data:
  a2aStubDelay: 2s
  agentCardRefreshInterval: 30s
  concurrency: "16"
  # The fixture has no LLM or paid boundary. Raise both token buckets so the test reaches the
  # dispatcher instead of testing D7's admission policy.
  senderRatePerMinute: "6000"
  senderRateBurst: "200"
  roomRatePerMinute: "6000"
  roomRateBurst: "200"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fixture-settings
  namespace: plain-agent
data:
  a2aStubDelay: 2s
  a2aStubHold: "false"
