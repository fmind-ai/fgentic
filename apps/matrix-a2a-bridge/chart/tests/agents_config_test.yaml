suite: agent routing config
templates:
  - templates/configmap.yaml
tests:
  - it: declares the immutable bridge configuration schema version
    asserts:
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "^schemaVersion: 1\\n"
  - it: renders anchored bridged-origin MXID namespaces
    set:
      bridgedOrigins:
        slack:
          - "@slack_*:fgentic.fmind.ai"
        telegram:
          - "@telegram_*:fgentic.fmind.ai"
    asserts:
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "bridgedOrigins:\\n\\s+slack:\\n\\s+- '@slack_\\*:fgentic\\.fmind\\.ai'"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "telegram:\\n\\s+- '@telegram_\\*:fgentic\\.fmind\\.ai'"
  - it: preserves exact room binding and defense-in-depth sender policy fields
    set:
      agents:
        agent-locked:
          namespace: kagent
          name: locked
          dataClassification: restricted
          description: Restricted test agent.
          avatarURL: mxc://fgentic.fmind.ai/locked-avatar
          allowedServers:
            - partner.example
          allowedRooms:
            - "!managed:fgentic.fmind.ai"
          allowedSenders:
            - "@ops-*:partner.example"
    asserts:
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "allowedServers:\\n\\s+- partner.example"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "allowedRooms:\\n\\s+- '!managed:fgentic.fmind.ai'"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "allowedSenders:\\n\\s+- '@ops-\\*:partner.example'"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "description: Restricted test agent\\."
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "dataClassification: restricted"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "avatarURL: mxc://fgentic.fmind.ai/locked-avatar"
  - it: preserves the fail-closed remote target trust and budget contract
    set:
      agents:
        agent-remote:
          url: https://agents.partner.example/a2a/reviewer
          timeout: 30s
          tokenBudget: 4096
          cardIdentity:
            name: Partner reviewer
            organization: Partner Example
            keyID: partner-reviewer-2026-07
            publicKey:
              kty: EC
              crv: P-256
              x: axfR8uEsQkf4vOblY6RA8ncDfYEt6zOg9KE5RdiYwpY
              y: T-NC4v4af5uO5-tKfA-eFivOM1drMV7Oy7ZAaDe_UfU
          description: Reviews documents through a governed partner endpoint.
          allowedSenders:
            - "@alice:fgentic.fmind.ai"
    asserts:
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "agent-remote:\\n\\s+allowedSenders:\\n\\s+- '@alice:fgentic\\.fmind\\.ai'\\n\\s+cardIdentity:"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "crv: P-256\\n\\s+kty: EC\\n\\s+x: axfR8uEsQkf4vOblY6RA8ncDfYEt6zOg9KE5RdiYwpY\\n\\s+\"y\": T-NC4v4af5uO5-tKfA-eFivOM1drMV7Oy7ZAaDe_UfU"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "keyID: partner-reviewer-2026-07\\n\\s+name: Partner reviewer\\n\\s+organization: Partner Example"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "timeout: 30s\\n\\s+tokenBudget: 4096\\n\\s+url: https://agents\\.partner\\.example/a2a/reviewer"
  - it: renders the three least-privilege demo agents and Alice-only allowlists
    asserts:
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "agent-platform-helper:\\n\\s+agentContractSHA256: 239cd0991f26cda8bb80bb40d1d29de5ffa64f868fb780af49d356a936cb4359\\n\\s+allowedRooms:\\n\\s+- '#lobby:fgentic\\.fmind\\.ai'\\n\\s+allowedSenders:\\n\\s+- '@alice:fgentic\\.fmind\\.ai'\\n\\s+dataClassification: public\\n\\s+description: .*\\n\\s+name: platform-helper"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "agent-docs-qa:\\n\\s+agentContractSHA256: 81fe04d0099b150e2ec15d431940228ab63daf1076715d9cc119ad91fff4fa87\\n\\s+allowedRooms:\\n\\s+- '#lobby:fgentic\\.fmind\\.ai'\\n\\s+allowedSenders:\\n\\s+- '@alice:fgentic\\.fmind\\.ai'\\n\\s+dataClassification: public\\n\\s+description: .*\\n\\s+name: docs-qa"
      - matchRegex:
          path: data["agents.yaml"]
          pattern: "agent-scribe:\\n\\s+agentContractSHA256: d6a4e2405cb96d9735cb3b03199ef3f89e662ad052281968bae248a69520f924\\n\\s+allowedRooms:\\n\\s+- '#lobby:fgentic\\.fmind\\.ai'\\n\\s+allowedSenders:\\n\\s+- '@alice:fgentic\\.fmind\\.ai'\\n\\s+dataClassification: public\\n\\s+description: .*\\n\\s+name: scribe"
  - it: keeps onboarding sender-filtered at runtime instead of rendering a static agent list
    asserts:
      - notExists:
          path: data["welcome.txt"]
