apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "matrix-a2a-bridge.fullname" . }}-agents
  labels:
    {{- include "matrix-a2a-bridge.labels" . | nindent 4 }}
data:
  # The bridged-origin namespaces plus ghost -> agent routing/invocation allowlist.
  # Description/avatar are fallback profile metadata. A successful AgentCard refresh replaces
  # the fallback in memory; the card remains the runtime source of truth.
  agents.yaml: |
    bridgedOrigins:
      {{- toYaml .Values.bridgedOrigins | nindent 6 }}
    agents:
      {{- range $ghost, $ref := .Values.agents }}
      {{ $ghost }}:
        {{- toYaml $ref | nindent 8 }}
      {{- end }}
  # The demo seeder can post this key verbatim. Keeping it derived from the same values as the
  # routing map prevents the welcome message from advertising a stale or unmapped ghost.
  welcome.txt: |
    Available agents (startup descriptions; send !agents for live AgentCard status):
    {{- range $ghost, $ref := .Values.agents }}
    - @{{ $ghost }}:{{ $.Values.config.serverName }} — {{ required (printf "agents.%s.description is required" $ghost) $ref.description }}
    {{- end }}
    Send !agents in this room to see only the agents your Matrix identity may invoke.
