{{- if .Values.metrics.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "matrix-a2a-bridge.fullname" . }}
  labels:
    {{- include "matrix-a2a-bridge.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "matrix-a2a-bridge.selectorLabels" . | nindent 6 }}
  podMetricsEndpoints:
    - port: metrics
{{- end }}
