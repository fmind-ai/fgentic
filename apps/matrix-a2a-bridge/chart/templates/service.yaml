apiVersion: v1
kind: Service
metadata:
  name: {{ include "matrix-a2a-bridge.fullname" . }}
  labels:
    {{- include "matrix-a2a-bridge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "matrix-a2a-bridge.selectorLabels" . | nindent 4 }}
  ports:
    - name: appservice
      port: {{ .Values.service.port }}
      targetPort: appservice
      protocol: TCP
