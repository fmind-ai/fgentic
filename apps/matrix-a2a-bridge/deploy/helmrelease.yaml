# The Matrix<->A2A bridge, deployed from its in-repo Helm chart, pinned by CI to the signed
# image digest. Ordering (matrix/agentgateway/kagent first) is enforced by the `bridge` Flux
# Kustomization's dependsOn (clusters/base/apps.yaml); its registration and database
# Secrets come from platform-secrets.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matrix-a2a-bridge
  namespace: bridge
spec:
  interval: 30m
  chart:
    spec:
      chart: ./apps/matrix-a2a-bridge/chart
      reconcileStrategy: Revision # redeploy when the chart in git changes
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  # Only the image and per-cluster settings are overridden here; the chart's values.yaml supplies
  # the rest (agents routing map, NetworkPolicy, security context). CI rewrites the tag to an
  # immutable digest; the local overlay (clusters/local) swaps the image for the side-loaded one.
  values:
    image:
      repository: ghcr.io/fmind-ai/matrix-a2a-bridge
      tag: sha-6bc5efefae9520529268da4ca7399e3abefd53d2@sha256:a9452fa9f2ca88aed89864500d12065dbacaa25b932ff3e83dbd248a10f8f948 # CI overwrites with sha-<git>@sha256:<digest>
    config:
      serverName: ${server_name}
    metrics:
      podMonitor:
        enabled: true # the observability layer provides the CRDs
