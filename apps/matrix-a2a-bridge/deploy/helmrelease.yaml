# Bootstrap source for the signed OCI chart. It stays suspended until the first successful CD
# publication verifies that both GHCR packages are public, then CD pins the chart digest, enables
# this source, and atomically switches the HelmRelease below to chartRef. Flux accepts only a
# keyless signature from this repository's CD workflow; an unsigned replacement is never exposed
# to helm-controller.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: matrix-a2a-bridge-chart
  namespace: flux-system
spec:
  interval: 30m
  suspend: false
  url: oci://ghcr.io/fmind-ai/charts/matrix-a2a-bridge
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: ^https://token.actions.githubusercontent.com$
        subject: ^https://github\.com/fmind-ai/fgentic/\.github/workflows/cd\.yml@refs/heads/main$
  ref:
    digest: sha256:bbeaa62fe42c891355f3e6261f6af07b64d23c7847d1b6719aca09e5c1c97672
---
# The Matrix<->A2A bridge initially deploys from its in-repo Helm chart. The first successful CD
# publication switches it to the digest-pinned OCIRepository above. Ordering
# (matrix/agentgateway/kagent first) is enforced by the `bridge` Flux Kustomization's dependsOn
# (clusters/base/apps.yaml); registration and database Secrets come from platform-secrets.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matrix-a2a-bridge
  namespace: bridge
spec:
  interval: 30m
  # Only the image and per-cluster settings are overridden here; the chart's values.yaml supplies
  # the rest (agent targets/descriptions, NetworkPolicy, security context). Sender MXIDs belong
  # here because Flux postBuild substitutes this manifest, not the chart's default values file.
  # CI rewrites the tag to an immutable digest; the local overlay swaps in the side-loaded image.
  values:
    image:
      repository: ghcr.io/fmind-ai/matrix-a2a-bridge
      tag: sha-c00e997c962770af1a4e75bf10f09c9cfdf839ea@sha256:077e89cf8f0023c296ee34278eafd1ce05874c60948796bb5dd6a97b60d74d20 # v0.1.0 build; CI re-pins on the next bridge change to main
    config:
      serverName: ${server_name}
      accessManagerMXID: "@alice:${server_name}"
      agentCardRefreshInterval: 5m
      deadManSwitchDelay: ${bridge_dead_man_switch_delay}
      otelEndpoint: http://otel-collector.monitoring.svc.cluster.local:4318
    bridgedOrigins: {}
    agents:
      agent-platform-helper:
        stage: prod
        dataClassification: public
        allowedRooms:
          - "#lobby:${server_name}"
        allowedSenders:
          - "@alice:${server_name}"
      agent-docs-qa:
        stage: prod
        dataClassification: public
        allowedRooms:
          - "#lobby:${server_name}"
        allowedSenders:
          - "@alice:${server_name}"
      agent-scribe:
        stage: prod
        dataClassification: public
        allowedRooms:
          - "#lobby:${server_name}"
        allowedSenders:
          - "@alice:${server_name}"
    metrics:
      podMonitor:
        enabled: true # the observability layer provides the CRDs
  chartRef:
    kind: OCIRepository
    name: matrix-a2a-bridge-chart
    namespace: flux-system
