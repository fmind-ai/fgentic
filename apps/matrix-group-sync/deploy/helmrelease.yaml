# The matrix-group-sync reconciler deploys from its in-repo Helm chart. It materializes exact
# IdP-group membership into managed Matrix room membership through a scoped access-manager identity
# (docs/adr/0009), self-contained and never bundled into the mautrix bridge.
#
# NOT yet wired into the reconciled cluster DAG (clusters/base/apps.yaml): like the ActivityPub
# gateway and the external mautrix bridge profiles, this unit is schema-validated but opt-in. It is
# enabled only once its scoped Secrets exist (access-manager Matrix token + Keycloak client secret),
# its exact bindings are declared, and the target rooms are adopted under the access-manager's
# controls with reviewed membership. It ships AUDIT-ONLY (config.enforce=false); real invites and
# kicks enable together with the revocation-SLO alert after that review.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matrix-group-sync
  namespace: matrix-group-sync
spec:
  interval: 30m
  chart:
    spec:
      chart: ./apps/matrix-group-sync/chart
      reconcileStrategy: Revision # redeploy when the chart in git changes
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/fmind-ai/matrix-group-sync
      tag: "0.1.0" # CI overwrites with sha-<git>@sha256:<digest> once the image is published
    config:
      serverName: ${server_name}
      accessManagerMXID: "@access-manager:${server_name}"
      # AUDIT-ONLY until reviewed room adoption (docs/adr/0009). Flip to true deliberately.
      enforce: false
    # Real bindings are declared per deployment; empty here keeps the unit inert until then.
    bindings: {}
    metrics:
      podMonitor:
        enabled: true # the observability layer provides the CRDs
