apiVersion: v1
kind: Service
metadata:
  name: {{ include "matrix-group-sync.fullname" . }}
  labels:
    {{- include "matrix-group-sync.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "matrix-group-sync.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
