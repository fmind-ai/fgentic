{{- if .Values.metrics.podMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "matrix-group-sync.fullname" . }}
  labels:
    {{- include "matrix-group-sync.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "matrix-group-sync.selectorLabels" . | nindent 6 }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
{{- end }}
