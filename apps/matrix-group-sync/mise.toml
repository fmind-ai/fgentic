[env]
APP_NAME = "matrix-group-sync"

[settings.task]
run_auto_install = false # fail fast in hooks/CI on a missing tool

[tools]
go = "latest"
golangci-lint = "latest"
gotestsum = "latest"
gitleaks = "latest"
dprint = "latest"
lefthook = "latest"

[tasks.all]
alias = "a"
description = "Format, check, test, and build the project"
run = ["mise run format", "mise run check", "mise run test", "mise run build"]

[tasks.install]
alias = "i"
description = "Tidy Go modules and download dependencies"
run = "go mod tidy"

[tasks.build]
alias = "b"
description = "Compile the production binary"
depends = ["build:go"]

[tasks."build:go"]
description = "Compile the production Go binary"
sources = ["go.mod", "go.sum", "**/*.go"]
outputs = ["bin/{{env.APP_NAME}}"]
# -buildvcs=false: the app builds cleanly inside a linked worktree where VCS stamping is unavailable.
run = "go build -buildvcs=false -o bin/$APP_NAME ./cmd/matrix-group-sync"

[tasks."build:image"]
description = "Build the production OCI image (distroless nonroot)"
run = "docker build -t ghcr.io/fmind-ai/$APP_NAME:local ."

[tasks.check]
alias = "c"
description = "Run all static checks"
depends = ["check:lint", "check:vuln", "check:format", "check:leaks"]

[tasks."check:lint"]
alias = "cl"
description = "Lint Go sources (golangci-lint)"
# --allow-parallel-runners lets this queue behind sibling app lints under the aggregate root check.
run = "golangci-lint run --allow-parallel-runners ./..."

[tasks."check:vuln"]
alias = "cv"
description = "Scan Go code for known vulnerabilities (govulncheck)"
run = "go tool govulncheck ./..."

[tasks."check:format"]
alias = "cf"
description = "Check config/markup formatting (dprint)"
run = "dprint check"

[tasks."check:leaks"]
alias = "cs"
description = "Audit git history for leaked secrets (gitleaks)"
run = "gitleaks git --log-opts=\"--max-count=100\" --verbose"

[tasks.test]
alias = "t"
description = "Run the test suite (gotestsum, race + coverage)"
run = """
set -e
gotestsum --format pkgname -- -race -buildvcs=false -coverprofile=coverage.out ./...
bash scripts/check-coverage.sh coverage.out
"""

[tasks.format]
alias = "f"
description = "Format all sources and documents"
depends = ["format:go", "format:dprint"]

[tasks."format:go"]
description = "Format Go sources and imports (goimports + gofumpt)"
run = ["go tool goimports -local github.com/fmind-ai/matrix-group-sync -w .", "go tool gofumpt -w ."]

[tasks."format:dprint"]
description = "Format JSON, Markdown, TOML, YAML with dprint"
run = "dprint fmt"

[tasks.clean]
description = "Remove build artifacts and coverage files"
run = "rm -rf bin/ tmp/ coverage.out"
