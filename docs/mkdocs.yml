      - 0006 Agentgateway chokepoint: adr/0006-agentgateway-chokepoint.md
      - 0007 Shared Postgres: adr/0007-shared-postgres-db-per-service.md
      - 0008 Unencrypted agent rooms: adr/0008-unencrypted-agent-rooms.md
