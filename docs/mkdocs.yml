      - Day-2 handbook: operations-handbook.md
      - Demo recording: demo-recording.md
      - Cost dashboards: cost-dashboards.md
      - Partner onboarding: federation-onboarding.md
      - Partner offboarding: federation-offboarding.md
      - Attribution audit: audit.md
      - Retention and erasure: retention.md
      - Administrator console: admin-console.md
      - Slack walkthrough: interop-slack.md
      - Performance evidence: performance.md
