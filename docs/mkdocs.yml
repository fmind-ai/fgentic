# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Fgentic
site_description: Sovereignty-first AI-agent collaboration on open standards
site_url: https://fmind-ai.github.io/fgentic/
repo_url: https://github.com/fmind-ai/fgentic
repo_name: fmind-ai/fgentic
edit_uri: edit/main/docs/
docs_dir: .
site_dir: ../.agents/tmp/docs-site
exclude_docs: |
  __pycache__/
  hooks.py
  mkdocs.yml
  pyproject.toml
  tests/
  uv.lock
strict: true
hooks:
  - hooks.py
theme:
  name: material
  font: false
  features:
    - content.action.edit
    - content.action.view
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - meta
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower-ascii
validation:
  links:
    anchors: warn
    absolute_links: warn
    not_found: warn
    unrecognized_links: warn
nav:
  - Home: index.md
  - Adoption:
      - Adopter decision brief: adopter-decision-brief.md
      - Adopter case studies:
          - Overview: adopters/index.md
          - One-page template: adopters/template.md
      - Inbound migration: migration-guide.md
      - Open agentic stack: open-stack.md
      - CNCF Sandbox application dossier: cncf-sandbox-application.md
      - Incumbent chat coexistence: chat-coexistence.md
      - Forking and adapting: forking.md
      - Exit strategy: exit-strategy.md
      - Persona onboarding:
          - Overview: onboarding/index.md
          - Security lead: onboarding/security-lead.md
          - Data protection officer: onboarding/dpo.md
          - Platform engineer: onboarding/platform-engineer.md
          - Developer: onboarding/developer.md
          - End user: onboarding/end-user.md
  - Architecture:
      - Architecture and vision: architecture.md
      - Design decisions D1-D20: design-decisions.md
      - Bridge specification: bridge.md
      - Identity and SSO: identity.md
      - Model profiles: models.md
      - Sovereign grounding: grounding.md
      - Federation: federation.md
      - Fediverse interop: fediverse.md
      - External-network interop: interop.md
      - Observability: observability.md
      - Licensing: licensing.md
      - Roadmap: roadmap.md
      - Stability contract: stability.md
  - Operations:
