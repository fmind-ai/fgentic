# Gitleaks config — extends the default ruleset, allowlists SOPS-encrypted material.
[extend]
useDefault = true

[[allowlists]]
description = "SOPS-encrypted secrets and public key material are safe to commit"
paths = [
  '''.*\.sops\.ya?ml$''', # age-encrypted Secret payloads (ENC[AES256_GCM,...])
  '''\.sops\.yaml$''', # the SOPS config itself (contains only the public recipient)
]
regexes = [
  '''age1[0-9a-z]{58}''', # age *public* recipients are not secret
  '''ENC\[AES256_GCM.*''', # SOPS ciphertext envelopes
]

[[allowlists]]
description = "did:key values are *public* keys (FEP-c390 identity anchors), not secrets"
regexTarget = "line"
regexes = [
  '''did:key:z[1-9A-HJ-NP-Za-km-z]+''',
]
