name: Fuzz
# Longer bounded mutation fuzzing over the owned untrusted-input parsers (#461). The deterministic
# seed corpora and Hypothesis examples already run on every CI check via the normal test gate; this
# scheduled job spends a larger per-target budget that would be too costly and nondeterministic to
# put on the per-commit path. A discovered crash fails the job and is triaged as a real defect.
on:
  schedule:
    - cron: "37 4 * * *"
  workflow_dispatch: {}
defaults:
  run:
    shell: bash
permissions:
  contents: read
concurrency:
  group: fuzz
  cancel-in-progress: false
jobs:
  fuzz:
    name: Run bounded fuzzing
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Go fuzz toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.11 # pin: keep the toolchain on the known-good mise (see ci.yml)
          install_args: go
          working_directory: apps/matrix-a2a-bridge
      - name: Bounded fuzz smoke (extended budget)
        env:
          FGENTIC_FUZZTIME: 60s
        run: mise run test:fuzz
