name: Docs
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/docs.yml
      - docs/**
      - mise.toml
  workflow_dispatch:
defaults:
  run:
    shell: bash
permissions:
  contents: read
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install documentation toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.11 # pin: keep the toolchain on the known-good mise (see ci.yml)
          install_args: python uv
      - name: Build documentation
        run: mise run docs:build
      - name: Upload GitHub Pages artifact
        if: vars.FGENTIC_PAGES_ENABLED == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .agents/tmp/docs-site
  deploy:
    name: Publish documentation
    if: vars.FGENTIC_PAGES_ENABLED == 'true'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write # publish the built site to GitHub Pages
      id-token: write # authenticate the Pages deployment through GitHub OIDC
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
