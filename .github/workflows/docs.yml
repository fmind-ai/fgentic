name: Docs
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/docs.yml
      - docs/**
      - mise.toml
  workflow_dispatch:
defaults:
  run:
    shell: bash
permissions:
  contents: read
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install documentation toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: python uv
      - name: Build documentation
        run: mise run docs:build
      - name: Upload GitHub Pages artifact
        if: vars.FGENTIC_PAGES_ENABLED == 'true'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: .agents/tmp/docs-site
  deploy:
    name: Publish documentation
    if: vars.FGENTIC_PAGES_ENABLED == 'true'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
