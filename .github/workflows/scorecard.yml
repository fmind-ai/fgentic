name: Scorecard
# OpenSSF Scorecard supply-chain posture (#460). Runs ossf/scorecard-action on a weekly schedule and on
# main pushes, and keeps the SARIF result as a workflow artifact. publish_results and SARIF upload to
# code scanning ride on #70's public-repo flip (both are unavailable on the private plan), so until then
# this is measurement only — it adds and weakens no control. Non-passing checks that stem from private-
# plan limits or deliberate design (the CD digest-pin ruleset) are recorded as accepted deviations in
# docs/security/openssf-best-practices.md rather than chased into a control change.
on:
  schedule:
    - cron: "41 5 * * 1"
  push:
    branches: [main]
  workflow_dispatch: {}
defaults:
  run:
    shell: bash
permissions:
  contents: read
concurrency:
  group: scorecard
  cancel-in-progress: false
jobs:
  analysis:
    name: Run OpenSSF Scorecard
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      # Read-only analysis. security-events:write (SARIF -> code scanning) and id-token:write
      # (publish_results transparency log) are intentionally omitted: both ride on #70's public-repo
      # flip and are unavailable on the private plan, so the result stays a bounded workflow artifact.
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
      - name: Upload Scorecard SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-sarif
          path: results.sarif
          if-no-files-found: error
          retention-days: 5
