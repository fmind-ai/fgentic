# Continuous delivery of the bridge image + chart (D13): build multi-arch → scan → SBOM + SLSA
# attest → keyless cosign sign → publish the chart to OCI → commit both immutable digests into
# the Flux deployment source. Flux keyless-verifies the chart before Helm can install it.
name: CD
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - apps/matrix-a2a-bridge/**
      - .github/workflows/cd.yml
  release:
    types: [published]
defaults:
  run:
    shell: bash
# Compatibility defaults for the supply-chain contract; every job below replaces them with its
# own least-privilege permission set, so these values are never effective job permissions.
permissions:
  artifact-metadata: write # link attestations to published GHCR artifacts
  attestations: write # persist SLSA and SBOM attestations
  id-token: write # authenticate keyless signing through GitHub OIDC
concurrency:
  # An auto-merged pin PR would add merge/check latency to every image publication and can be
  # superseded by the next build. Keep the direct GitOps commit, serialize publishers, and retry
  # against a moving main branch instead.
  group: ${{ github.workflow }}-bridge-digest-pin
  cancel-in-progress: false # never cancel a half-published release
jobs:
  bridge-image:
    name: Build and publish bridge artifacts
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      artifact-metadata: write # link provenance to the GHCR artifact
      attestations: write # persist SLSA/SBOM attestations
      contents: write # commit the image digest back to the deploy manifest
      id-token: write # keyless signing via OIDC
      packages: write # push to GHCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # digest-pin retries rebase onto concurrent main updates
          persist-credentials: false
      - name: Install release toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.7.11 # pin: keep the toolchain on the known-good mise (see ci.yml)
          cache: false # release inputs must not depend on a mutable Actions cache
          install_args: yq trivy helm rg dprint # rg + dprint back scripts/gen-bom.sh (BOM regen after the digest pin)
      - name: Set lower-case registry path
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          registry_owner="${REPOSITORY_OWNER,,}"
          echo "IMAGE_REPOSITORY=ghcr.io/${registry_owner}/matrix-a2a-bridge" >> "${GITHUB_ENV}"
          echo "CHART_REPOSITORY=ghcr.io/${registry_owner}/charts/matrix-a2a-bridge" >> "${GITHUB_ENV}"
      - name: Select immutable image and chart versions
        id: versions
        run: |
          short_sha="${GITHUB_SHA:0:12}"
          base_chart_version=$(mise exec -- yq -er '.version' apps/matrix-a2a-bridge/chart/Chart.yaml)
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
            [[ "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] \
              || { echo "Release tag is not SemVer: ${GITHUB_REF_NAME}" >&2; exit 1; }
            chart_version="$release_version"
            image_tags="${IMAGE_REPOSITORY}:sha-${GITHUB_SHA}"$'\n'"${IMAGE_REPOSITORY}:${GITHUB_REF_NAME}"
          else
            chart_version="${base_chart_version}-sha.${short_sha}"
            # Publish only the immutable sha tag: deploys are digest-pinned, so a floating :latest
            # is unused, and the no-latest admission policy (infra/policies) would reject it anyway.
            image_tags="${IMAGE_REPOSITORY}:sha-${GITHUB_SHA}"
          fi
          {
            echo "chart-version=${chart_version}"
            echo "image-tags<<EOF"
            echo "${image_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          cache-image: false # privileged releases must not restore mutable Actions caches
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          cache-binary: false # install the pinned action's Buildx binary without cache state
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: apps/matrix-a2a-bridge
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.versions.outputs.image-tags }}
      - name: Scan pushed image (trivy)
        # Vulnerabilities only: the repo trivy.yaml also enables the license scanner, which
        # flags the distroless base's GPL OS packages — a deliberate, documented inclusion
        # (SPEC §10), not a CI-actionable finding.
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: mise exec -- trivy image --scanners vuln --exit-code 1 --severity HIGH,CRITICAL "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the image (keyless OIDC)
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
      - name: Generate the image SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          artifact-name: matrix-a2a-bridge-${{ github.sha }}.spdx.json
          output-file: matrix-a2a-bridge.spdx.json
          format: spdx-json
          upload-artifact: true
          upload-release-assets: false
      - name: Attest image provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Attach the SBOM attestation as an OCI referrer
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: matrix-a2a-bridge.spdx.json
          push-to-registry: true
      - name: Package and publish the Helm chart to OCI
        id: chart
        env:
          CHART_VERSION: ${{ steps.versions.outputs.chart-version }}
        run: |
          mkdir -p dist
          mise exec -- helm package apps/matrix-a2a-bridge/chart \
            --destination dist \
            --version "${CHART_VERSION}" \
            --app-version "sha-${GITHUB_SHA:0:12}"
          chart="dist/matrix-a2a-bridge-${CHART_VERSION}.tgz"
          output=$(mise exec -- helm push "$chart" "oci://${CHART_REPOSITORY%/matrix-a2a-bridge}")
          echo "$output"
          digest=$(sed -n 's/^Digest: //p' <<<"$output")
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] \
            || { echo "Could not parse chart digest from helm push" >&2; exit 1; }
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Sign and attest the Helm chart
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.CHART_REPOSITORY }}
          subject-digest: ${{ steps.chart.outputs.digest }}
          push-to-registry: true
      - name: Sign the Helm chart for Flux verification
        env:
          CHART_DIGEST: ${{ steps.chart.outputs.digest }}
        # Static supply-chain contract equivalent: cosign sign --yes "${CHART_REPOSITORY}@${{ steps.chart.outputs.digest }}"
        run: cosign sign --yes "${CHART_REPOSITORY}@${CHART_DIGEST}"
      - name: Verify keyless image and chart signatures
        env:
          CHART_DIGEST: ${{ steps.chart.outputs.digest }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          identity='^https://github\.com/fmind-ai/fgentic/\.github/workflows/cd\.yml@refs/(heads/main|tags/v.*)$'
          issuer='https://token.actions.githubusercontent.com'
          cosign verify \
            --certificate-identity-regexp "$identity" \
            --certificate-oidc-issuer "$issuer" \
            "${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          cosign verify \
            --certificate-identity-regexp "$identity" \
            --certificate-oidc-issuer "$issuer" \
            "${CHART_REPOSITORY}@${CHART_DIGEST}"
      - name: Require public deploy artifacts before enabling keyless Flux pulls
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          for package in matrix-a2a-bridge charts%2Fmatrix-a2a-bridge; do
            visibility=$(gh api "/orgs/${REPOSITORY_OWNER}/packages/container/${package}" --jq .visibility)
            if [[ "$visibility" != "public" ]]; then
              echo "GHCR package ${package//%2F//} is ${visibility}; make it public before Flux is switched to keyless OCI verification." >&2
              exit 1
            fi
          done
      - name: Pin the digest in the deploy manifest
        if: github.ref == 'refs/heads/main'
        env:
          CHART_DIGEST: ${{ steps.chart.outputs.digest }}
          IMAGE_TAG: sha-${{ github.sha }}@${{ steps.build.outputs.digest }}
        run: |
          mise exec -- yq -i \
            'with(select(.kind == "OCIRepository");
              .spec.suspend = false |
              .spec.ref.digest = strenv(CHART_DIGEST))' \
            apps/matrix-a2a-bridge/deploy/helmrelease.yaml
          mise exec -- yq -i \
            'with(select(.kind == "HelmRelease");
              .spec.chartRef = {
                "kind": "OCIRepository",
                "name": "matrix-a2a-bridge-chart",
                "namespace": "flux-system"
              } |
              del(.spec.chart) |
              .spec.values.image.tag = strenv(IMAGE_TAG))' \
            apps/matrix-a2a-bridge/deploy/helmrelease.yaml
          # Regenerate the adopter BOM so the newly pinned bridge image digest stays consistent with
          # release/bom.yaml; otherwise check:bom (the #188 drift gate) goes red on main and on every
          # PR that merges with it (issues #984/#986).
          mise exec -- bash scripts/gen-bom.sh
      - name: Commit the digest (Flux picks it up)
        if: github.ref == 'refs/heads/main'
        env:
          CHART_DIGEST: ${{ steps.chart.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
          IMAGE_TAG: sha-${{ github.sha }}@${{ steps.build.outputs.digest }}
        run: |
          manifest=apps/matrix-a2a-bridge/deploy/helmrelease.yaml
          bom=release/bom.yaml
          attempts=5

          # Keep checkout credentials out of earlier build artifacts; authorize git only here.
          gh auth setup-git --hostname github.com
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$manifest" "$bom"
          git diff --cached --quiet && exit 0
          git commit -m "chore(bridge): pin image sha-${GITHUB_SHA::7} [skip ci]"

          for attempt in $(seq 1 "$attempts"); do
            git fetch origin main
            if ! git rebase origin/main; then
              conflicts=$(git diff --name-only --diff-filter=U)
              # Only the two CI-owned files (the digest manifest and its derived BOM) may conflict —
              # a queued digest publisher updated them first. Any other conflicted path is unexpected.
              if [ -z "$conflicts" ] || printf '%s\n' "$conflicts" | grep -qvxF -e "$manifest" -e "$bom"; then
                echo "Digest-pin rebase has an unexpected conflict: ${conflicts:-<none>}" >&2
                git rebase --abort
                exit 1
              fi

              # Reapply this build's immutable digest to the manifest, then regenerate the BOM from it
              # so both derived files are internally consistent; never resolve unrelated conflicts.
              git restore --source=REBASE_HEAD --worktree "$manifest"
              mise exec -- yq -i \
                'with(select(.kind == "OCIRepository");
                  .spec.suspend = false |
                  .spec.ref.digest = strenv(CHART_DIGEST))' \
                "$manifest"
              mise exec -- yq -i \
                'with(select(.kind == "HelmRelease");
                  .spec.chartRef = {
                    "kind": "OCIRepository",
                    "name": "matrix-a2a-bridge-chart",
                    "namespace": "flux-system"
                  } |
                  del(.spec.chart) |
                  .spec.values.image.tag = strenv(IMAGE_TAG))' \
                "$manifest"
              mise exec -- bash scripts/gen-bom.sh
              git add "$manifest" "$bom"
              if git diff --cached --quiet; then
                git rebase --skip
              else
                GIT_EDITOR=true git rebase --continue
              fi
            fi

            if git push origin HEAD:main; then
              exit 0
            fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "Digest pin could not be pushed after $attempts attempts" >&2
              exit 1
            fi

            delay=$((attempt + RANDOM % 5))
            echo "main moved during push; retrying in ${delay}s ($attempt/$attempts)"
            sleep "$delay"
          done

  release-sbom:
    name: Publish release SBOM
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read # attach Syft output to a GitHub Release
      contents: write # upload the SPDX asset to the published release
      packages: read # pull the released image when GHCR is private
    steps:
      - name: Set lower-case release image path
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          registry_owner="${REPOSITORY_OWNER,,}"
          echo "IMAGE_REPOSITORY=ghcr.io/${registry_owner}/matrix-a2a-bridge" >> "${GITHUB_ENV}"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Attach the released image SBOM to the GitHub Release
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        env:
          # Syft uses its own registry client, not the docker CLI credential store, so the
          # docker/login-action above does not authenticate its pull of the private GHCR image
          # (it fails with UNAUTHORIZED). Pass credentials through Syft's native registry-auth
          # env vars so the SBOM step works whether the package is private or public (issue #324).
          SYFT_REGISTRY_AUTH_AUTHORITY: ghcr.io
          SYFT_REGISTRY_AUTH_USERNAME: ${{ github.actor }}
          SYFT_REGISTRY_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image: ${{ env.IMAGE_REPOSITORY }}:${{ github.event.release.tag_name }}
          artifact-name: matrix-a2a-bridge-${{ github.event.release.tag_name }}.spdx.json
          output-file: matrix-a2a-bridge-${{ github.event.release.tag_name }}.spdx.json
          format: spdx-json
          upload-artifact: true
          upload-release-assets: true
