name: NetworkPolicy conformance
on:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  conformance:
    name: kind and Calico policy enforcement
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: Verify A2A authorization boundary
        run: mise run test:a2a-authorization
      - name: Verify governed MCP boundary
        run: mise run test:mcp-governance
      - name: Run conformance and mutation guard
        run: mise run test:network-policies:kind
        env:
          NETWORK_POLICY_DIAGNOSTICS_DIR: ${{ runner.temp }}/network-policy-diagnostics
      - name: Preserve cluster diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: network-policy-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/network-policy-diagnostics
          if-no-files-found: warn
          retention-days: 14
