name: CI
on:
  push:
    branches: [main]
  pull_request:
defaults:
  run:
    shell: bash
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  check:
    name: Check and test repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # check:leaks scans recent git history
          persist-credentials: false
      - name: Install mise system
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
      - name: Install application toolchains
        # Each app pins its own tools and run_auto_install is off; Python also syncs its lockfile.
        run: mise run install:apps
      - name: Format sources
        run: mise run format
      - name: Run checks
        run: mise run check
      # `test` includes test:agents-golden; keep it after the static check gate so the heavy
      # repository phases remain sequential on one runner.
      - name: Run tests, including deterministic Agent golden tasks
        run: mise run test
      - name: Verify no changes
        run: test -z "$(git status --porcelain)"
  bridge-integration:
    name: Bridge appservice integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect bridge changes
        id: bridge-changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "${EVENT_NAME}" != "pull_request" ]] \
            || ! git diff --quiet "${BASE_SHA}" "${HEAD_SHA}" -- \
              apps/matrix-a2a-bridge .github/workflows/ci.yml mise.toml; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Install bridge integration toolchain
        if: steps.bridge-changes.outputs.run == 'true'
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          # The app config supplies kind and kubectl; the inherited root config supplies jq and
          # yq. Go builds run inside the integration harness's pinned container images.
          install_args: kind kubectl jq yq
          working_directory: apps/matrix-a2a-bridge
      - name: Run bridge integration
        if: steps.bridge-changes.outputs.run == 'true'
        run: mise run test:integration
