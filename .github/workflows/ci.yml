name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # check:leaks scans recent git history
      - name: Install mise system
        uses: jdx/mise-action@v4
      - name: Install app toolchain
        # The app pins its own tools (go, golangci-lint, ...) and run_auto_install is off.
        run: mise --cd apps/matrix-a2a-bridge install
      - name: Format sources
        run: mise run format
      - name: Run checks
        run: mise run check
      - name: Run tests
        run: mise run test
      - name: Verify no changes
        run: test -z "$(git status --porcelain)"
