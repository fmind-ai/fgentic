# Production-shaped profiles compose the observability stack, so workloads that render monitor
# CRs or tracing policies must wait for its CRDs, Collector Service, and ReferenceGrant. Evaluation
# profiles deliberately omit observability and therefore leave these optional DAG edges absent.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: keycloak
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/dependsOn/-
        value:
          name: observability
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: agentgateway
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/dependsOn/-
        value:
          name: observability
