# Flux Kustomization DAG for the Fgentic platform infra. `flux bootstrap ... --path=clusters/<env>`
# reconciles the overlay; these Kustomizations then reconcile the infra/ paths in dependency
# order. Sources/HelmReleases install their own CRDs; the only out-of-band step is the Gateway API
# CRDs (one-time bootstrap — see the matrix-agents runbook).
#
# Every Kustomization substitutes flux post-build variables from the per-cluster
# `platform-settings` ConfigMap (plus an optional `platform-settings-overrides` for ad-hoc
# tweaks) — the single place a deployment sets its domain, GCP project, TLS issuer, and model.
#
# NOTE: the `platform-secrets` Kustomization the DAG depends on is NOT here — secrets are
# per-cluster (registration regexes embed the server_name; credentials never span environments),
# so each overlay declares its own (clusters/<env>/secrets.yaml -> clusters/<env>/secrets/).
---
# Platform operators: cert-manager, Traefik, CNPG operator, agentgateway + kagent control planes.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: controllers
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/flux
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# Web gateway: ClusterIssuers + the multi-SAN TLS Gateway + HTTP->HTTPS redirect.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/gateway
  prune: true
  dependsOn:
    - name: controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# Shared CloudNativePG cluster + per-tenant databases. Role passwords come from platform-secrets.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/postgres
  prune: true
  dependsOn:
    - name: controllers
    - name: platform-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# The Matrix layer (ESS). Depends on Postgres (its databases/roles) + the gateway (HTTPRoutes).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: matrix
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/matrix
  prune: true
  dependsOn:
    - name: postgres
    - name: gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# agentgateway data plane (LLM egress + A2A route to kagent). Depends on the control plane + CRDs.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/agentgateway
  prune: true
  dependsOn:
    - name: controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# kagent extras (ModelConfig + sample Agent). The kagent HelmRelease is in the controllers layer.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/kagent
  prune: true
  dependsOn:
    - name: controllers
    - name: agentgateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
