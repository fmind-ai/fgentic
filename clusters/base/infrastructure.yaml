# Flux Kustomization DAG for the Fgentic platform infra. `flux bootstrap ... --path=clusters/<env>`
# reconciles the overlay; these Kustomizations then reconcile the infra/ paths in dependency
# order. Sources/HelmReleases install their own CRDs; the only out-of-band step is the Gateway API
# CRDs (one-time bootstrap — see the matrix-agents runbook).
#
# Every Kustomization substitutes flux post-build variables from the per-cluster
# `platform-settings` ConfigMap (plus an optional `platform-settings-overrides` for ad-hoc
# tweaks) — the single place a deployment sets its domain, GCP project, TLS issuer, and model.
#
# NOTE: the `platform-secrets` Kustomization the DAG depends on is NOT here — secrets are
# per-cluster (registration regexes embed the server_name; credentials never span environments),
# so each overlay declares its own (clusters/<env>/secrets.yaml -> clusters/<env>/secrets/).
---
# Every platform namespace, first and dependency-free: HelmRelease objects and Secrets cannot be
# created in namespaces that do not exist, and namespace-per-layer creates circular waits.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: namespaces
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/namespaces
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Observability (SPEC §9): kube-prometheus-stack + platform monitors. Early in the DAG — other
# layers reference its CRDs (PodMonitor) and NetworkPolicies already admit `monitoring` (D14).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./infra/observability
  prune: true
  wait: true
  timeout: 15m
  dependsOn:
    - name: namespaces
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# Monitors + alert rules for the platform, split from the stack above: their CRDs (PodMonitor,
# PrometheusRule) only exist once kube-prometheus-stack is installed.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-monitors
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./infra/observability/monitors
  prune: true
  dependsOn:
    - name: observability
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Platform operators: cert-manager, Traefik, CNPG operator, agentgateway + kagent control planes.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: controllers
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/flux
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: namespaces
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# Web gateway: ClusterIssuers + the multi-SAN TLS Gateway + HTTP->HTTPS redirect.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 30m
  path: ./infra/gateway
  prune: true
  dependsOn:
    - name: controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# Shared CloudNativePG cluster + per-tenant databases. Role passwords come from platform-secrets.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./infra/postgres
  prune: true
  wait: true # gate dependents on the CNPG Cluster actually being healthy
  timeout: 10m
  dependsOn:
    - name: controllers
    - name: platform-secrets
    - name: observability # CNPG's PodMonitor needs the CRD
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# The Matrix layer (ESS). Depends on Postgres (its databases/roles) + the gateway (HTTPRoutes).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: matrix
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./infra/matrix
  prune: true
  wait: true # ESS is the platform's core — dependents (the bridge) need it actually up
  timeout: 20m
  dependsOn:
    - name: postgres
    - name: gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# agentgateway control plane + data plane (LLM egress + A2A route to kagent). Depends on the
# CRDs chart (controllers) and platform-secrets (the model credential).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./infra/agentgateway
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: controllers
    - name: platform-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
---
# kagent platform + extras (ModelConfig + sample Agent). Depends on postgres — the kagent
# controller migrates its database at startup (which is why it cannot sit in controllers).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./infra/kagent
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: controllers
    - name: agentgateway
    - name: postgres
    - name: platform-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
      - kind: ConfigMap
        name: platform-settings-overrides
        optional: true
