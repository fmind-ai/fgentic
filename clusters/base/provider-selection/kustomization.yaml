# Replace only the selected profile segment of Flux paths before they reach the controller.
# `check:model-catalog` validates each llm_provider/llm_model pair; `check:admin-console` validates
# the enabled/disabled admin profiles. Keeping each path prefix makes unknown values fail closed.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
replacements:
  - source:
      kind: ConfigMap
      name: platform-settings
      namespace: flux-system
      fieldPath: data.llm_provider
    targets:
      - select:
          group: kustomize.toolkit.fluxcd.io
          version: v1
          kind: Kustomization
          name: agentgateway-provider
          namespace: flux-system
        fieldPaths:
          - spec.path
        options:
          delimiter: /
          index: 5
  - source:
      kind: ConfigMap
      name: platform-settings
      namespace: flux-system
      fieldPath: data.admin_console
    targets:
      - select:
          group: kustomize.toolkit.fluxcd.io
          version: v1
          kind: Kustomization
          name: gateway
          namespace: flux-system
        fieldPaths:
          - spec.path
        options:
          delimiter: /
          index: 4
      - select:
          group: kustomize.toolkit.fluxcd.io
          version: v1
          kind: Kustomization
          name: admin
          namespace: flux-system
        fieldPaths:
          - spec.path
        options:
          delimiter: /
          index: 4
  - source:
      kind: ConfigMap
      name: platform-settings
      namespace: flux-system
      fieldPath: data.synthetic_canary
    targets:
      - select:
          group: kustomize.toolkit.fluxcd.io
          version: v1
          kind: Kustomization
          name: canary
          namespace: flux-system
        fieldPaths:
          - spec.path
        options:
          delimiter: /
          index: 4
  - source:
      kind: ConfigMap
      name: platform-settings
      namespace: flux-system
      fieldPath: data.alert_delivery
    targets:
      - select:
          group: kustomize.toolkit.fluxcd.io
          version: v1
          kind: Kustomization
          name: alert-delivery
          namespace: flux-system
        fieldPaths:
          - spec.path
        options:
          delimiter: /
          index: 4
