# Replace only the provider segment of the agentgateway-provider Flux path. `check:model-catalog`
# validates each tracked llm_provider/llm_model pair against the governed inventory before this
# selection reaches Flux. Keeping the path prefix still makes an unknown profile fail at render time.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
replacements:
  - source:
      kind: ConfigMap
      name: platform-settings
      namespace: flux-system
      fieldPath: data.llm_provider
    targets:
      - select:
          group: kustomize.toolkit.fluxcd.io
          version: v1
          kind: Kustomization
          name: agentgateway-provider
          namespace: flux-system
        fieldPaths:
          - spec.path
        options:
          delimiter: /
          index: 5
