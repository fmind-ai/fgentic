# GCP (GKE) reference cluster overlay: the shared base DAG + GCP settings + the reusable
# production-HA component. Provider-specific values remain here; replica/PDB posture composes
# independently so another production provider can reuse it without copying GCP assumptions.
# Bootstrap: Terraform first (infra/terraform), then `flux bootstrap github ... --path=clusters/gcp`.
# flux bootstrap adds ./flux-system below this directory.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-system
  - ../base
  - platform-settings.yaml
  - secrets.yaml
components:
  - ../base/provider-selection
  - ../../infra/production-ha/cluster
patches:
  # Keep policy durations deployment-configurable while making the production reference finite.
  # The component is relative to the Matrix Kustomization's ./infra/matrix source path.
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: matrix
      namespace: flux-system
    patch: |
      - op: add
        path: /spec/components/-
        value: retention
