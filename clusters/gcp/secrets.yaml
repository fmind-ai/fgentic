# SOPS-encrypted secrets for THIS cluster, decrypted in-cluster by kustomize-controller (age key
# = secret sops-age in flux-system). Depends only on the namespaces layer.
# Generate the files with `scripts/gen-secrets.sh fgentic.fmind.ai gcp` (encrypted in place).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-secrets
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./clusters/gcp/secrets
  prune: true
  dependsOn:
    - name: namespaces
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
