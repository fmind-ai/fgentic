# Deployment values for the GCP (GKE) reference cluster — see clusters/local/platform-settings.yaml
# for how this ConfigMap is consumed. Values here must match infra/terraform/terraform.tfvars
# (project, bucket, ingress IP name) — Terraform provisions what these names point at.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-settings
  namespace: flux-system
data:
  server_name: fgentic.fmind.ai
  cluster_issuer: letsencrypt-prod # switch to letsencrypt-staging while testing DNS/ACME
  acme_email: mederic.hurier@fmind.dev
  gcp_project: fgentic-ai
  pg_backups_bucket: fgentic-ai-pg-backups
  ingress_ip_name: fgentic-ingress-ip
  # Selects infra/agentgateway/providers/profiles/<llm_provider>; switching to an installed
  # profile needs only these settings plus that profile's per-cluster SOPS Secret.
  llm_provider: vertex
  # Vertex AI OpenAI-compatible endpoint requires <publisher>/<model>.
  llm_model: google/gemini-2.5-flash
  vertex_region: europe-west1
  # Provider-specific connection settings. They remain inert unless their profile is selected.
  # Eligible OpenAI projects can use eu.api.openai.com for European processing (see docs/models.md).
  openai_host: api.openai.com
  # Azure resource name only (not the endpoint URL); replace before selecting azure-openai.
  azure_openai_resource: not-configured
  # Alert when aggregate model-token consumption exceeds this count over 15 minutes.
  llm_usage_budget_15m: "100000"
  # Initial namespace-compute profiles for the two-node reference. These are admission ceilings,
  # not reservations; tune them only from observed usage and alongside node-pool capacity.
  quota_default_request_cpu: 25m
  quota_default_request_memory: 64Mi
  quota_default_limit_cpu: 500m
  quota_default_limit_memory: 512Mi
  quota_small_pods: "24"
  quota_small_requests_cpu: "4"
  quota_small_requests_memory: 8Gi
  quota_small_limits_cpu: "12"
  quota_small_limits_memory: 16Gi
  quota_core_pods: "32"
  quota_core_requests_cpu: "8"
  quota_core_requests_memory: 16Gi
  quota_core_limits_cpu: "24"
  quota_core_limits_memory: 24Gi
  quota_compute_pods: "16"
  quota_compute_requests_cpu: "8"
  quota_compute_requests_memory: 16Gi
  quota_compute_limits_cpu: "16"
  quota_compute_limits_memory: 24Gi
  # The reference production profile is SSO-only. Override deliberately for a break-glass window.
  mas_local_login_enabled: "false"
