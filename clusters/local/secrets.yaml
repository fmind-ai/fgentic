# SOPS-encrypted secrets for THIS cluster, decrypted in-cluster by kustomize-controller (age key
# = secret sops-age in flux-system). No dependsOn: it retries until each target namespace exists.
# Generate the files with `scripts/gen-secrets.sh fgentic.localhost local` (encrypted in place).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-secrets
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./clusters/local/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
