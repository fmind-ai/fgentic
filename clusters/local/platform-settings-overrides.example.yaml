# Local, UNTRACKED override for values that must not live in git — e.g. your real GCP project ID.
#
# Every cluster Kustomization lists this ConfigMap AFTER `platform-settings` in its Flux
# `substituteFrom` with `optional: true`, so any key set here wins over the committed placeholder
# at reconcile time (clusters/base/infrastructure.yaml). It is NOT reconciled from git — it lives
# only in your cluster, so copy it, set your values, and apply it once per cluster:
#
#   cp clusters/local/platform-settings-overrides.example.yaml \
#      clusters/local/platform-settings-overrides.yaml   # the copy is gitignored
#   $EDITOR clusters/local/platform-settings-overrides.yaml
#   mise run cluster:overrides   # kubectl apply + reconcile root flux-system (idempotent)
#
# Re-apply (re-run the task) after recreating the cluster. See docs/forking.md for the full
# adapt-a-fork checklist.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-settings-overrides
  namespace: flux-system
data:
  gcp_project: your-gcp-project # <-- set your real GCP project ID here (kept out of git)
  # Set to the current API endpoint /32 seen by Pod egress after kubernetes.default Service DNAT
  # before enabling the knowledge profile; 192.0.2.1/32 is intentionally unreachable.
  kubernetes_api_egress_cidr: 192.0.2.1/32
  kubernetes_api_egress_port: "6443"
