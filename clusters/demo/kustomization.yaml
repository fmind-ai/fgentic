# Ephemeral evaluation overlay. The demo script installs Flux controllers locally and points the
# unchanged HelmRelease graph at a cluster-local snapshot of this checkout; no GitHub source or
# SOPS key is involved. Production continues to use clusters/local or clusters/gcp.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - platform-settings.yaml
  - secrets.yaml
  # Demo-only: reconcile the ActivityPub agent gateway (issue #489). local/gcp deliberately omit it,
  # so this is the single composition point. Public exposure stays gated (deploy keeps httpRoute off).
  - activitypub.yaml
components:
  - ../base/provider-selection
patches:
  # The scanner is absent from evaluation, including its otherwise early-owned namespace budget.
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: namespaces
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: namespaces
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: Namespace
              name: trivy-system
            patch: |
              $patch: delete
              apiVersion: v1
              kind: Namespace
              metadata:
                name: trivy-system
          - target:
              kind: ResourceQuota
              name: compute-budget
              namespace: trivy-system
            patch: |
              $patch: delete
              apiVersion: v1
              kind: ResourceQuota
              metadata:
                name: compute-budget
                namespace: trivy-system
          - target:
              kind: LimitRange
              name: container-defaults
              namespace: trivy-system
            patch: |
              $patch: delete
              apiVersion: v1
              kind: LimitRange
              metadata:
                name: container-defaults
                namespace: trivy-system
  # Evaluation omits the optional IdP and observability stacks. Local password auth is created
  # through MAS's supported Admin API, while production remains SSO-first and fully monitored.
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: keycloak
      namespace: flux-system
    patch: |
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: keycloak
        namespace: flux-system
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: observability
      namespace: flux-system
    patch: |
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: observability
        namespace: flux-system
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: observability-monitors
      namespace: flux-system
    patch: |
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: observability-monitors
        namespace: flux-system
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: trivy-operator
      namespace: flux-system
    patch: |
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: trivy-operator
        namespace: flux-system
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: postgres
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: postgres
        namespace: flux-system
      spec:
        # Demo reconciles the ActivityPub gateway (issue #489), so its scoped role + Database compose
        # into platform-pg here. local/gcp omit this component, keeping their CNPG render unchanged.
        components:
          - components/activitypub
        dependsOn:
          - name: controllers
          - name: platform-secrets
        patches:
          - target:
              kind: Cluster
              name: platform-pg
            patch: |
              - op: remove
                path: /spec/backup
              - op: remove
                path: /spec/serviceAccountTemplate
              - op: replace
                path: /spec/monitoring/enablePodMonitor
                value: false
              - op: remove
                path: /spec/managed/roles/4
          - target:
              kind: ScheduledBackup
              name: platform-pg-nightly
            patch: |
              $patch: delete
              apiVersion: postgresql.cnpg.io/v1
              kind: ScheduledBackup
              metadata:
                name: platform-pg-nightly
                namespace: postgres
          - target:
              kind: Database
              name: keycloak
            patch: |
              $patch: delete
              apiVersion: postgresql.cnpg.io/v1
              kind: Database
              metadata:
                name: keycloak
                namespace: postgres
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: matrix
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: matrix
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: HelmRelease
              name: matrix-stack
            patch: |
              - op: remove
                path: /spec/values/matrixAuthenticationService/additional/10-upstream-oidc
              - op: add
                path: /spec/values/matrixAuthenticationService/additional/05-demo-admin
                value:
                  configSecret: mas-demo-admin
                  configSecretKey: config.yaml
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: agentgateway
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: agentgateway
        namespace: flux-system
      spec:
        patches:
          - target:
              group: agentgateway.dev
              version: v1alpha1
              kind: AgentgatewayPolicy
              name: tracing
              namespace: agentgateway-system
            patch: |
              $patch: delete
              apiVersion: agentgateway.dev/v1alpha1
              kind: AgentgatewayPolicy
              metadata:
                name: tracing
                namespace: agentgateway-system
          # Demo also reconciles the ActivityPub agent gateway (issue #489), a SECOND caller of the
          # A2A chokepoint. Admit its workload identity onto the SAME kagent route the bridge uses —
          # demo-scoped only, so clusters/local and clusters/gcp keep the single-caller boundary.
          # The AP gateway dials /api/a2a/kagent/<name> through agentgateway with its own workload
          # credential (activitypub-agent-gateway-credential), registered as a second a2a-bridge-callers
          # entry by the cluster-only demo secret path. Widen the fail-closed CEL to OR in that workload
          # without loosening the path/method scope, so a bridge compromise still cannot reach another
          # namespace and the AP gateway still cannot leave the reviewed kagent A2A surface.
          - target:
              group: agentgateway.dev
              version: v1alpha1
              kind: AgentgatewayPolicy
              name: a2a-bridge-authorization
              namespace: agentgateway-system
            patch: |
              - op: replace
                path: /spec/traffic/authorization/policy/matchExpressions/0
                value: >-
                  (apiKey.workload == "matrix-a2a-bridge" ||
                  apiKey.workload == "activitypub-agent-gateway") &&
                  request.path.startsWith("/api/a2a/kagent/") &&
                  (request.method == "POST" ||
                  (request.method == "GET" &&
                  request.path.endsWith("/.well-known/agent-card.json")))
          # kagent's A2A endpoint is unauthenticated by default, so the agentgateway ingress
          # NetworkPolicy is load-bearing: only the `bridge` and `kagent` namespaces may reach the
          # proxy data plane on :8080. Demo adds the `activitypub` namespace to that exact allow rule
          # so the reconciled AP gateway can dial the chokepoint. Demo-scoped: local/gcp keep the
          # gateway (and this ingress source) absent.
          - target:
              kind: NetworkPolicy
              name: agentgateway-allow-agents
              namespace: agentgateway-system
            patch: |
              - op: add
                path: /spec/ingress/0/from/-
                value:
                  namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: activitypub
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: agentgateway-provider
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: agentgateway-provider
        namespace: flux-system
      spec:
        patches:
          - target:
              group: agentgateway.dev
              version: v1alpha1
              kind: AgentgatewayBackend
              name: llm-vertex
              namespace: agentgateway-system
            patch: |
              - op: add
                path: /spec/policies/auth/gcp/secretRef
                value:
                  name: gcp-adc
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: kagent
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: kagent
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: HelmRelease
              name: kagent
            patch: |
              - op: replace
                path: /spec/values/otel/tracing/enabled
                value: false
              # The UI and KMCP controller are outside the Matrix mention-to-reply path. Scaling
              # the UI to zero and disabling KMCP saves 320 MiB of requested RAM here only.
              - op: add
                path: /spec/values/ui
                value:
                  replicas: 0
              - op: add
                path: /spec/values/kmcp
                value:
                  enabled: false
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: bridge
      namespace: flux-system
    patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: bridge
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: HelmRelease
              name: matrix-a2a-bridge
            patch: |
              - op: replace
                path: /spec/values/image
                value:
                  repository: matrix-a2a-bridge
                  tag: ${demo_bridge_tag}
                  pullPolicy: Never
              - op: replace
                path: /spec/values/config/otelEndpoint
                value: ""
              - op: replace
                path: /spec/values/metrics/podMonitor/enabled
                value: false
