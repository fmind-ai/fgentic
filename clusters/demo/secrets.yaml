# Runtime Secrets are created directly by scripts/demo.sh and remain cluster-only. This empty Flux
# inventory preserves the production DAG's platform-secrets dependency without pretending that
# ephemeral evaluation credentials belong in git or SOPS.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/demo/empty
  prune: true
  dependsOn:
    - name: namespaces
  sourceRef:
    kind: GitRepository
    name: flux-system
