# Defaults for the ephemeral evaluation installer. scripts/demo.sh copies this overlay into its
# cluster-local source snapshot and changes only these values when FGENTIC_LLM_* selects a profile.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-settings
  namespace: flux-system
data:
  server_name: fgentic.localhost
  cluster_issuer: local-ca
  acme_email: unused@fgentic.localhost
  gcp_project: not-configured
  pg_backups_bucket: unused-demo
  ingress_ip_name: unused-demo
  llm_provider: demo
  llm_model: fgentic-demo
  demo_bridge_tag: local
  vertex_region: europe-west1
  openai_host: api.openai.com
  azure_openai_resource: not-configured
  llm_usage_budget_15m: "100000"
  # The disposable profile keeps delayed events off until its runtime proof is explicitly added.
  bridge_dead_man_switch_delay: 0s
  synapse_max_event_delay_duration: "null"
  # Keep the disposable profile aligned with the single-node local admission ceilings.
  quota_default_request_cpu: 25m
  quota_default_request_memory: 64Mi
  quota_default_limit_cpu: 500m
  quota_default_limit_memory: 512Mi
  quota_small_pods: "12"
  quota_small_requests_cpu: "2"
  quota_small_requests_memory: 4Gi
  quota_small_limits_cpu: "8"
  quota_small_limits_memory: 8Gi
  quota_core_pods: "24"
  quota_core_requests_cpu: "4"
  quota_core_requests_memory: 8Gi
  quota_core_limits_cpu: "16"
  quota_core_limits_memory: 16Gi
  quota_compute_pods: "8"
  quota_compute_requests_cpu: "4"
  quota_compute_requests_memory: 8Gi
  quota_compute_limits_cpu: "8"
  quota_compute_limits_memory: 12Gi
  mas_local_login_enabled: "true"
  # Evaluation stays minimal and never exposes the administrator client.
  admin_console: disabled
