# Keep the logical A/B/C substitutions identical on both planes so the reused federation
# manifests cannot silently reverse trust direction. Here the local address is B and the remote
# relay reaches A; the lifecycle replaces both RFC 5737 fixtures in its ephemeral snapshot.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-settings
  namespace: flux-system
data:
  server_name: org-a.fgentic.test
  # Repo-wide catalog validation applies to every cluster settings file even though B removes
  # the provider layer structurally. Keep the valid provider/model pair explicit.
  llm_provider: demo
  llm_model: fgentic-demo
  federation_partner_server_name: org-b.fgentic.test
  federation_denied_server_name: org-c.fgentic.test
  federation_local_gateway_ip: 192.0.2.11
  federation_remote_gateway_ip: 192.0.2.10
  cluster_issuer: local-ca
  ingress_ip_name: unused-federation-split-b
  quota_default_request_cpu: 25m
  quota_default_request_memory: 64Mi
  quota_default_limit_cpu: 500m
  quota_default_limit_memory: 512Mi
  quota_small_pods: "12"
  quota_small_requests_cpu: "2"
  quota_small_requests_memory: 4Gi
  quota_small_limits_cpu: "8"
  quota_small_limits_memory: 8Gi
  quota_core_pods: "24"
  quota_core_requests_cpu: "4"
  quota_core_requests_memory: 8Gi
  quota_core_limits_cpu: "16"
  quota_core_limits_memory: 16Gi
  quota_compute_pods: "8"
  quota_compute_requests_cpu: "4"
  quota_compute_requests_memory: 8Gi
  quota_compute_limits_cpu: "8"
  quota_compute_limits_memory: 12Gi
