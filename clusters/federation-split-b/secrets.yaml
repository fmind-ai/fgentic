# The split lifecycle creates disposable credentials and public CA material before Flux starts.
# This empty inventory preserves the dependency without placing generated material in Git.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/federation-split-b/empty
  prune: true
  dependsOn:
    - name: namespaces
  sourceRef:
    kind: GitRepository
    name: flux-system
