# Disposable federation hardening overlay. It keeps only the controllers, Gateway,
# CloudNativePG, and three Synapse releases needed to exercise allow and deny paths.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - platform-settings.yaml
  - secrets.yaml
components:
  - ../../infra/federation/cluster
