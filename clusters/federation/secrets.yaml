# Federation-lab credentials and the public local CA are created cluster-locally. This empty
# inventory preserves the production DAG without pretending ephemeral credentials belong in Git.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/federation/empty
  prune: true
  dependsOn:
    - name: namespaces
  sourceRef:
    kind: GitRepository
    name: flux-system
